<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>MCU Reading & Dressing Check</title>

<style>
:root{
--bg:#0b1020;
--panel:#121a33;
--card1:#2b7cff;
--card2:#ff9f1c;
--card3:#20c997;
--card4:#b26bff;
--text:#f4f7ff;
--muted:rgba(244,247,255,.78);
--border:rgba(255,255,255,.16);

--tileW:230px;
--tileH:235px;
--frameW:165px;
--frameH:135px;
--gap:34px;
--labelFont:26px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
margin:0;
font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
-webkit-user-select:none;
user-select:none;
-webkit-touch-callout:none;
}

header{
position:sticky;
top:0;
z-index:20;
background:linear-gradient(180deg,var(--panel),rgba(18,26,51,.95));
border-bottom:1px solid rgba(255,255,255,.10);
padding:14px 14px calc(12px + env(safe-area-inset-top));
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.title{
margin-right:auto;
font-weight:900;
color:var(--muted);
font-size:18px;
letter-spacing:.2px;
}

.pill{
border:none;
border-radius:999px;
padding:10px 14px;
font-size:15px;
font-weight:900;
background:rgba(255,255,255,.08);
color:var(--text);
}

.tabs{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.tab{
border:none;
border-radius:999px;
padding:14px 18px;
font-size:18px;
font-weight:900;
color:#fff;
touch-action:manipulation;
}

.tab.active{
box-shadow:0 0 0 5px rgba(255,255,255,.18) inset;
transform:translateY(-1px);
}

#tabWord{background:#2b7cff}
#tabListen{background:#20c997}
#tabScan{background:#ff9f1c}
#tabDress{background:#b26bff}
#tabResults{background:#ff4d4f}

main{
padding:18px 16px calc(22px + env(safe-area-inset-bottom));
}

.promptBox{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.10);
border-radius:22px;
padding:18px;
margin-bottom:18px;
text-align:center;
}

.modeTitle{
font-size:18px;
font-weight:900;
color:var(--muted);
margin-bottom:6px;
}

.prompt{
font-size:34px;
font-weight:950;
min-height:44px;
line-height:1.1;
}

.subPrompt{
margin-top:8px;
font-size:16px;
color:var(--muted);
min-height:22px;
}

.targetWrap{
margin-top:16px;
display:flex;
justify-content:center;
align-items:center;
min-height:170px;
}

.targetCard{
width:220px;
height:170px;
border-radius:24px;
background:#fff;
border:2px solid rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
box-shadow:0 8px 22px rgba(0,0,0,.18);
color:#000;
font-size:34px;
font-weight:950;
text-align:center;
padding:10px;
}

.targetCard img{
width:100%;
height:100%;
object-fit:contain;
object-position:center;
background:#fff;
pointer-events:none;
-webkit-user-drag:none;
user-drag:none;
}

.board{
display:grid;
gap:var(--gap);
justify-content:center;
align-content:start;
margin-top:14px;
}

.board.two{
grid-template-columns:repeat(2,minmax(0,var(--tileW)));
}

.board.four{
grid-template-columns:repeat(2,minmax(0,var(--tileW)));
}

.choice{
width:var(--tileW);
height:var(--tileH);
border:none;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 10px 24px rgba(0,0,0,.22);
touch-action:manipulation;
}

.choice:nth-child(1){ background:linear-gradient(180deg,var(--card1),#1f66db); border-radius:18px; }
.choice:nth-child(2){ background:linear-gradient(180deg,var(--card2),#f18805); border-radius:34px 18px 34px 18px; }
.choice:nth-child(3){ background:linear-gradient(180deg,var(--card3),#0f9f75); border-radius:18px 34px 18px 34px; }
.choice:nth-child(4){ background:linear-gradient(180deg,var(--card4),#8b3dff); border-radius:28px; }

.choice.correctCue{
outline:7px solid #fff;
outline-offset:4px;
}

.choice.dim{
opacity:.45;
}

.media{
flex:1 1 auto;
display:flex;
align-items:center;
justify-content:center;
padding:14px 12px 10px;
}

.frame{
width:var(--frameW);
height:var(--frameH);
border-radius:18px;
border:2px solid rgba(255,255,255,.18);
background:#fff;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.frame img{
width:100%;
height:100%;
object-fit:contain;
object-position:center;
background:#fff;
pointer-events:none;
-webkit-user-drag:none;
user-drag:none;
}

.wordOnly{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:42px;
font-weight:950;
color:#000;
background:#fff;
padding:16px;
line-height:1.05;
}

.labelWrap{
padding:10px;
display:flex;
justify-content:center;
align-items:center;
}

.label{
width:100%;
min-height:64px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:#fff;
color:#000;
border-radius:16px;
border:2px solid rgba(0,0,0,.14);
padding:10px 12px;
font-size:var(--labelFont);
font-weight:950;
line-height:1.08;
}

.feedback{
margin-top:18px;
min-height:34px;
text-align:center;
font-size:28px;
font-weight:950;
}

.good{color:#2fe6b3}
.bad{color:#ff8c8a}

.tools{
margin-top:20px;
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.btn{
border:none;
border-radius:999px;
padding:14px 18px;
font-size:16px;
font-weight:900;
background:rgba(255,255,255,.1);
color:#fff;
touch-action:manipulation;
}

.btn.on{
box-shadow:0 0 0 4px rgba(255,255,255,.16) inset;
}

.results{
max-width:950px;
margin:0 auto;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.10);
border-radius:22px;
padding:18px;
}

.results h3{
margin:0 0 14px 0;
font-size:22px;
}

.resultGrid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:14px;
}

.resultCard{
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.10);
border-radius:18px;
padding:14px;
}

.resultCard strong{
display:block;
font-size:18px;
margin-bottom:6px;
}

.noteBox{
margin-top:16px;
width:100%;
min-height:120px;
border-radius:16px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:#fff;
padding:12px;
font:inherit;
}

@media (max-width:650px){
.prompt{font-size:28px}
.resultGrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
<div class="row">
<div class="title">MCU Reading & Dressing Check</div>
<div class="pill">Mode: <span id="modeName">Word → Picture</span></div>
<div class="pill">Rounds: <span id="rounds">0</span></div>
<div class="pill">Correct: <span id="correct">0</span></div>
</div>

<div class="tabs">
<button class="tab active" id="tabWord" type="button">Word</button>
<button class="tab" id="tabListen" type="button">Listen</button>
<button class="tab" id="tabScan" type="button">Scan</button>
<button class="tab" id="tabDress" type="button">Dressing</button>
<button class="tab" id="tabResults" type="button">Results</button>
</div>
</header>

<main>
<div id="taskView">
<div class="promptBox">
<div class="modeTitle" id="modeTitle">Word → Picture</div>
<div class="prompt" id="prompt">Show me DRINK</div>
<div class="subPrompt" id="subPrompt">Use this to see whether reading is the main problem</div>
<div class="targetWrap" id="targetWrap"></div>
</div>

<div class="board two" id="board"></div>

<div class="feedback" id="feedback"></div>

<div class="tools">
<button class="btn" id="speakBtn" type="button">Speak prompt</button>
<button class="btn" id="nextBtn" type="button">Next item</button>
<button class="btn" id="twoBtn" type="button">2 choices</button>
<button class="btn" id="fourBtn" type="button">4 choices</button>
<button class="btn" id="cueBtn" type="button">Cue after error</button>
<button class="btn" id="resetBtn" type="button">Reset scores</button>
</div>
</div>

<div id="resultsView" style="display:none">
<div class="results">
<h3>Results summary</h3>
<div class="resultGrid">
<div class="resultCard">
<strong>Word → Picture</strong>
<div id="resWord">0 / 0 correct</div>
</div>
<div class="resultCard">
<strong>Listen → Picture</strong>
<div id="resListen">0 / 0 correct</div>
</div>
<div class="resultCard">
<strong>Left / Right Scan</strong>
<div id="resScan">0 / 0 correct</div>
</div>
<div class="resultCard">
<strong>Dressing Perception</strong>
<div id="resDress">0 / 0 correct</div>
</div>
</div>

<textarea class="noteBox" id="clinicalNote" readonly></textarea>
</div>
</div>
</main>

<script>
const ITEMS = {
drink:{label:"DRINK", photo:"drink.png"},
toilet:{label:"TOILET", photo:"toilet.png"},
food:{label:"FOOD", photo:"food.png"},
help:{label:"HELP", photo:"help.png"},
nurse:{label:"NURSE", photo:"nurse.png"},
doctor:{label:"DOCTOR", photo:"doctor.png"},
sit:{label:"SIT", photo:"sit.png"},
stop:{label:"STOP", photo:"stop.png"},
sleeve:{label:"SLEEVE", photo:"clothes.png"},
neck:{label:"NECK", photo:"clothes.png"},
top:{label:"TOP", photo:"clothes.png"},
bottom:{label:"BOTTOM", photo:"clothes.png"},
repeat:{label:"REPEAT", photo:"repeat.png"},
slowdown:{label:"SLOW DOWN", photo:"slowdown.png"},
dontunderstand:{label:"DON'T UNDERSTAND", photo:"dontunderstand.png"}
};

const TASKS = {
word: [
{prompt:"Show me DRINK", answer:"drink", options:["drink","toilet","food","help"], targetType:"word"},
{prompt:"Show me TOILET", answer:"toilet", options:["toilet","drink","food","help"], targetType:"word"},
{prompt:"Show me NURSE", answer:"nurse", options:["nurse","doctor","help","food"], targetType:"word"},
{prompt:"Show me STOP", answer:"stop", options:["stop","sit","help","drink"], targetType:"word"}
],
listen: [
{prompt:"Listen and choose", answer:"drink", options:["drink","toilet","food","help"], speak:"Show me drink", targetType:"none"},
{prompt:"Listen and choose", answer:"doctor", options:["doctor","nurse","food","help"], speak:"Show me doctor", targetType:"none"},
{prompt:"Listen and choose", answer:"sit", options:["sit","stop","drink","help"], speak:"Show me sit", targetType:"none"},
{prompt:"Listen and choose", answer:"repeat", options:["repeat","slowdown","dontunderstand","help"], speak:"Show me repeat", targetType:"none"}
],
scan: [
{prompt:"Find DRINK", answer:"drink", options:["drink","toilet"], forcedPositions:["left","right"], targetType:"word"},
{prompt:"Find TOILET", answer:"toilet", options:["drink","toilet"], forcedPositions:["right","left"], targetType:"word"},
{prompt:"Find NURSE", answer:"nurse", options:["nurse","doctor"], forcedPositions:["left","right"], targetType:"word"},
{prompt:"Find DOCTOR", answer:"doctor", options:["nurse","doctor"], forcedPositions:["right","left"], targetType:"word"}
],
dress: [
{prompt:"Show me SLEEVE", answer:"sleeve", options:["sleeve","neck","top","bottom"], targetType:"word"},
{prompt:"Show me NECK", answer:"neck", options:["neck","sleeve","top","bottom"], targetType:"word"},
{prompt:"Show me TOP", answer:"top", options:["top","bottom","sleeve","neck"], targetType:"word"},
{prompt:"Show me BOTTOM", answer:"bottom", options:["bottom","top","sleeve","neck"], targetType:"word"}
]
};

const STATS = {
word:{correct:0,total:0},
listen:{correct:0,total:0},
scan:{correct:0,total:0,leftMiss:0,rightMiss:0},
dress:{correct:0,total:0}
};

let mode = "word";
let currentTask = null;
let choiceCount = 2;
let cueAfterError = true;
let rounds = 0;
let correctTotal = 0;

const board = document.getElementById("board");
const promptEl = document.getElementById("prompt");
const subPrompt = document.getElementById("subPrompt");
const targetWrap = document.getElementById("targetWrap");
const feedback = document.getElementById("feedback");
const roundsEl = document.getElementById("rounds");
const correctEl = document.getElementById("correct");
const modeName = document.getElementById("modeName");
const modeTitle = document.getElementById("modeTitle");
const taskView = document.getElementById("taskView");
const resultsView = document.getElementById("resultsView");
const noteBox = document.getElementById("clinicalNote");

function setActiveTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function speak(text){
try{
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.rate = 0.9;
u.pitch = 1.0;
speechSynthesis.speak(u);
}catch(e){}
}

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function updateTop(){
roundsEl.textContent = rounds;
correctEl.textContent = correctTotal;
}

function changeMode(newMode){
mode = newMode;
feedback.textContent = "";
feedback.className = "feedback";

if(mode === "results"){
setActiveTab("tabResults");
taskView.style.display = "none";
resultsView.style.display = "block";
renderResults();
return;
}

resultsView.style.display = "none";
taskView.style.display = "block";

if(mode === "word"){
setActiveTab("tabWord");
modeName.textContent = "Word → Picture";
modeTitle.textContent = "Word → Picture";
subPrompt.textContent = "If this is poor but Listen is better, think reading problem";
}
if(mode === "listen"){
setActiveTab("tabListen");
modeName.textContent = "Listen → Picture";
modeTitle.textContent = "Listen → Picture";
subPrompt.textContent = "If this is better than Word, reading may be the main difficulty";
}
if(mode === "scan"){
setActiveTab("tabScan");
modeName.textContent = "Left / Right Scan";
modeTitle.textContent = "Left / Right Scan";
subPrompt.textContent = "Watch for repeated misses on one side";
}
if(mode === "dress"){
setActiveTab("tabDress");
modeName.textContent = "Dressing Perception";
modeTitle.textContent = "Dressing Perception";
subPrompt.textContent = "Checks sleeve / neck / top / bottom recognition";
}

nextTask();
}

function buildTarget(task){
targetWrap.innerHTML = "";
if(task.targetType === "none") return;

const card = document.createElement("div");
card.className = "targetCard";

if(task.targetType === "word"){
card.textContent = ITEMS[task.answer].label;
} else if(task.targetType === "picture"){
const img = document.createElement("img");
img.src = ITEMS[task.answer].photo;
img.alt = "";
img.draggable = false;
card.appendChild(img);
}

targetWrap.appendChild(card);
}

function getTaskOptions(task){
let opts = [...task.options];
if(choiceCount === 2) opts = opts.slice(0,2);
if(choiceCount === 4) opts = opts.slice(0,4);

if(mode === "scan" && task.forcedPositions && opts.length === 2){
const answerKey = task.answer;
const otherKey = opts.find(x=>x!==answerKey);
if(task.forcedPositions[0] === "left"){
return [answerKey, otherKey];
} else {
return [otherKey, answerKey];
}
}
return shuffle(opts);
}

function buildChoice(key, wordOnly=false){
const item = ITEMS[key];
const btn = document.createElement("button");
btn.className = "choice";
btn.type = "button";
btn.dataset.key = key;

const media = document.createElement("div");
media.className = "media";

const frame = document.createElement("div");
frame.className = "frame";

if(wordOnly){
const word = document.createElement("div");
word.className = "wordOnly";
word.textContent = item.label;
frame.appendChild(word);
} else {
const img = document.createElement("img");
img.src = item.photo;
img.alt = "";
img.draggable = false;
frame.appendChild(img);
}

media.appendChild(frame);

const labelWrap = document.createElement("div");
labelWrap.className = "labelWrap";

const label = document.createElement("div");
label.className = "label";
label.textContent = item.label;

labelWrap.appendChild(label);
btn.appendChild(media);
btn.appendChild(labelWrap);

btn.addEventListener("click", ()=>selectChoice(btn, key));
return btn;
}

function nextTask(){
feedback.textContent = "";
feedback.className = "feedback";
board.innerHTML = "";

const pool = TASKS[mode];
currentTask = pool[Math.floor(Math.random()*pool.length)];

promptEl.textContent = currentTask.prompt;
buildTarget(currentTask);

const opts = getTaskOptions(currentTask);
board.className = "board " + (opts.length === 2 ? "two" : "four");

const useWordOnlyChoices = (mode === "dress" || mode === "word");
opts.forEach(key=>{
board.appendChild(buildChoice(key, useWordOnlyChoices));
});

if(currentTask.speak){
speak(currentTask.speak);
}
}

function selectChoice(btn, key){
rounds += 1;
STATS[mode].total += 1;

if(key === currentTask.answer){
correctTotal += 1;
STATS[mode].correct += 1;
feedback.textContent = "Correct";
feedback.className = "feedback good";
speak("Correct");
} else {
feedback.textContent = "Try again";
feedback.className = "feedback bad";
speak("Try again");

if(mode === "scan"){
const all = [...board.children];
const index = all.indexOf(btn);
if(index === 0) STATS.scan.leftMiss += 1;
if(index === 1) STATS.scan.rightMiss += 1;
}

if(cueAfterError){
[...board.children].forEach(choice=>{
if(choice.dataset.key === currentTask.answer){
choice.classList.add("correctCue");
} else {
choice.classList.add("dim");
}
});
}
}

updateTop();
}

function renderResults(){
document.getElementById("resWord").textContent = `${STATS.word.correct} / ${STATS.word.total} correct`;
document.getElementById("resListen").textContent = `${STATS.listen.correct} / ${STATS.listen.total} correct`;
document.getElementById("resScan").textContent = `${STATS.scan.correct} / ${STATS.scan.total} correct | Left misses: ${STATS.scan.leftMiss} | Right misses: ${STATS.scan.rightMiss}`;
document.getElementById("resDress").textContent = `${STATS.dress.correct} / ${STATS.dress.total} correct`;

let note = "";
note += "Clinical impression:\n";

if(STATS.word.total > 0 && STATS.listen.total > 0){
const wordRate = STATS.word.correct / STATS.word.total;
const listenRate = STATS.listen.correct / STATS.listen.total;

if(listenRate > wordRate + 0.2){
note += "- Listen performance is better than Word performance, which may suggest reading impairment contributes more than basic picture recognition.\n";
} else if(wordRate < 0.5 && listenRate < 0.5){
note += "- Both Word and Listen are reduced, suggesting broader comprehension / attention / cognitive difficulty rather than reading alone.\n";
} else {
note += "- Word and Listen performance are relatively similar.\n";
}
}

if(STATS.scan.leftMiss > STATS.scan.rightMiss + 1){
note += "- More left-sided misses than right-sided misses, which may support visual inattention / scanning difficulty to the left.\n";
} else if(STATS.scan.rightMiss > STATS.scan.leftMiss + 1){
note += "- More right-sided misses than left-sided misses.\n";
} else if(STATS.scan.total > 0){
note += "- Scan errors do not show a clear side pattern.\n";
}

if(STATS.dress.total > 0){
const dressRate = STATS.dress.correct / STATS.dress.total;
if(dressRate < 0.5){
note += "- Poor performance on sleeve / neck / top / bottom tasks suggests dressing difficulty is likely influenced by perceptual and/or praxis impairment, not only language.\n";
} else {
note += "- Dressing-part identification is relatively better than expected.\n";
}
}

note += "\nStrategy ideas:\n";
note += "- Keep only 2 choices when performance drops.\n";
note += "- Use spoken cue + picture before written word if reading is weak.\n";
note += "- For dressing, use a plain top, fixed orientation, and visually highlight neck and sleeves.\n";
note += "- If scanning errors are side-specific, place targets with deliberate cueing toward the missed side.\n";

noteBox.value = note;
}

document.getElementById("tabWord").addEventListener("click", ()=>changeMode("word"));
document.getElementById("tabListen").addEventListener("click", ()=>changeMode("listen"));
document.getElementById("tabScan").addEventListener("click", ()=>changeMode("scan"));
document.getElementById("tabDress").addEventListener("click", ()=>changeMode("dress"));
document.getElementById("tabResults").addEventListener("click", ()=>changeMode("results"));

document.getElementById("speakBtn").addEventListener("click", ()=>{
if(currentTask?.speak) speak(currentTask.speak);
else if(currentTask?.prompt) speak(currentTask.prompt);
});

document.getElementById("nextBtn").addEventListener("click", nextTask);

document.getElementById("twoBtn").addEventListener("click", function(){
choiceCount = 2;
document.getElementById("twoBtn").classList.add("on");
document.getElementById("fourBtn").classList.remove("on");
nextTask();
});

document.getElementById("fourBtn").addEventListener("click", function(){
choiceCount = 4;
document.getElementById("fourBtn").classList.add("on");
document.getElementById("twoBtn").classList.remove("on");
nextTask();
});

document.getElementById("cueBtn").addEventListener("click", function(){
cueAfterError = !cueAfterError;
this.classList.toggle("on", cueAfterError);
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
Object.keys(STATS).forEach(k=>{
Object.keys(STATS[k]).forEach(x=>STATS[k][x] = 0);
});
rounds = 0;
correctTotal = 0;
updateTop();
feedback.textContent = "";
feedback.className = "feedback";
nextTask();
});

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.getElementById("twoBtn").classList.add("on");
document.getElementById("cueBtn").classList.add("on");

updateTop();
changeMode("word");
</script>
</body>
</html>
