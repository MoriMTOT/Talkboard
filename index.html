<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ward Talkboard</title>

<style>
:root{
--bg:#0b1020;
--panel:#121a33;
--tile:#1b2a57;
--text:#f2f6ff;
--accent:#76a7ff;
--radius:22px;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system, system-ui;
}

/* ---------------- TABS ---------------- */

header{
display:flex;
gap:14px;
padding:18px;
background:var(--panel);
flex-wrap:wrap;
}

.tab{
flex:1;
min-width:120px;
font-size:22px;
padding:18px 20px;
border-radius:20px;
border:1px solid rgba(255,255,255,.18);
background:transparent;
color:white;
font-weight:700;
}

.tab.active{
border-color:var(--accent);
box-shadow:0 0 0 3px rgba(118,167,255,.25) inset;
}

/* ---------------- GRID ---------------- */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:24px;
padding:24px;
}

@media (min-width:900px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

/* ---------------- TILES ---------------- */

.tile{
min-height:230px;
border-radius:var(--radius);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:800;
text-align:center;
border:none;
color:white;
}

.move{ background:#2fe6b3; color:black; }
.team{ background:#2b7cff; }
.equipment{ background:#ffcf5a; color:black; }
.needs{ background:#ff6b6b; }

.icon{
font-size:72px;
margin-bottom:18px;
}

/* ---------------- SPEECH ---------------- */

functionPlaceholder{}

</style>
</head>

<body>

<header>
<button class="tab active" onclick="show('move')" id="moveTab">Move</button>
<button class="tab" onclick="show('team')" id="teamTab">Team</button>
<button class="tab" onclick="show('equipment')" id="equipmentTab">Equipment</button>
<button class="tab" onclick="show('needs')" id="needsTab">Needs</button>
</header>

<div id="content" class="grid"></div>

<script>

const data = {

move: [
{icon:"🪑", text:"Sit", say:"I want to sit up"},
{icon:"🧍", text:"Stand", say:"I want to stand"},
{icon:"⬆️", text:"Out of Bed", say:"I want to get out of bed"},
{icon:"🛏️", text:"In Bed", say:"I want to stay in bed"},
{icon:"😴", text:"Rest", say:"I need a rest"},
{icon:"✋", text:"Stop", say:"Stop please"}
],

team: [
{icon:"👩‍⚕️", text:"Nurse", say:"I want the nurse"},
{icon:"👨‍⚕️", text:"Doctor", say:"I want the doctor"},
{icon:"👐", text:"OT", say:"I want occupational therapy"},
{icon:"🏃", text:"PT", say:"I want physiotherapy"},
{icon:"💬", text:"SP", say:"I want speech therapy"},
{icon:"📞", text:"Call", say:"Please call someone"}
],

equipment: [
{icon:"♿", text:"Wheelchair", say:"I want my wheelchair"},
{icon:"🛏️", text:"Bed Adjust", say:"Please adjust the bed"},
{icon:"🛎️", text:"Call Bell", say:"Use the call bell"},
{icon:"🪑", text:"Chair", say:"I want the chair"},
{icon:"🧻", text:"Toilet", say:"I need the toilet"},
{icon:"🛌", text:"Reposition", say:"Help me change position"}
],

needs: [
{icon:"💧", text:"Drink", say:"I want a drink"},
{icon:"🍽️", text:"Food", say:"I am hungry"},
{icon:"🤕", text:"Pain", say:"I have pain"},
{icon:"🥶", text:"Cold", say:"I am cold"},
{icon:"🥵", text:"Hot", say:"I am hot"},
{icon:"🚨", text:"HELP", say:"I need help now"}
]

};

function show(section){

document.getElementById("moveTab").classList.remove("active");
document.getElementById("teamTab").classList.remove("active");
document.getElementById("equipmentTab").classList.remove("active");
document.getElementById("needsTab").classList.remove("active");

document.getElementById(section+"Tab").classList.add("active");

let container = document.getElementById("content");
container.innerHTML="";

data[section].forEach(item=>{
let btn=document.createElement("button");
btn.className="tile "+section;
btn.innerHTML=`<div class="icon">${item.icon}</div>${item.text}`;
btn.onclick=()=>speak(item.say);
container.appendChild(btn);
});

}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.rate=0.95;
speechSynthesis.speak(u);
}

show("move");

</script>

</body>
</html>
