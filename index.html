<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ward Talkboard</title>
<style>
:root{
--bg:#0b1020;
--panel:#121a33;
--tile:#172a55;
--tile2:#102247;
--text:#f3f6ff;
--muted:rgba(243,246,255,.75);
--border:rgba(255,255,255,.16);

/* Page chips */
--chipFont:22px;
--chipPadY:14px;
--chipPadX:20px;
--chipMinH:58px;

/* Control chips */
--ctrlFont:16px;
--ctrlPadY:10px;
--ctrlPadX:14px;

/* Tiles */
--tileMinH:160px; /* smaller = less vertical scrolling */
--labelFont:26px; /* bigger label */
--iconSize:58px; /* ✅ half size */
--gap:14px;
--radius:18px;

/* Pain bar */
--painFont:22px;
--painMinH:56px;
}

html,body{height:100%}
body{
margin:0;
font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--text);
}

header{
position:sticky; top:0; z-index:20;
background:linear-gradient(180deg, var(--panel), rgba(18,26,51,.92));
border-bottom:1px solid rgba(255,255,255,.10);
padding:14px 14px calc(12px + env(safe-area-inset-top));
}

.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

.title{
margin-right:auto;
font-weight:800;
letter-spacing:.2px;
color:var(--muted);
font-size:16px;
}

/* Controls: Confirm, Sound, Edit, Reset, Clear */
.controls .chip{
font-size:var(--ctrlFont);
padding:var(--ctrlPadY) var(--ctrlPadX);
min-height:44px;
border-radius:999px;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
color:var(--text);
font-weight:800;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.controls .chip.on{
border-color:rgba(118,167,255,.65);
box-shadow:0 0 0 3px rgba(118,167,255,.20) inset;
background:rgba(118,167,255,.10);
}
.controls .danger{
background:rgba(255,77,79,.14);
border-color:rgba(255,77,79,.35);
}

/* Page buttons */
.pages{margin-top:12px}
.pages .chip{
font-size:var(--chipFont);
padding:var(--chipPadY) var(--chipPadX);
min-height:var(--chipMinH);
border-radius:999px;
border:none;
font-weight:950;
letter-spacing:.2px;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.pages .chip.active{
box-shadow:0 0 0 5px rgba(255,255,255,.18) inset;
transform:translateY(-1px);
}

/* fixed colours for page chips */
#pageMove{ background:#2b7cff; color:white; }
#pageTeam{ background:#2fe6b3; color:#062218; }
#pageEquipment{ background:#ffd43b; color:#2a2100; }
#pageNeeds{ background:#ff4d4f; color:white; }
#pagePain{ background:#b26bff; color:white; }

main{
padding:14px 14px calc(14px + env(safe-area-inset-bottom));
}

/* ✅ 3 columns (less scrolling) */
.grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:var(--gap);
}
/* On very small screens, keep 2 */
@media (max-width: 520px){
.grid{ grid-template-columns:repeat(2, 1fr); }
}

.tile{
border:1px solid rgba(255,255,255,.12);
border-radius:var(--radius);
background:linear-gradient(180deg, var(--tile), var(--tile2));
min-height:var(--tileMinH);
overflow:hidden;
display:flex;
flex-direction:column;
position:relative;
touch-action:manipulation;
}

.tile.yesTile{
background:linear-gradient(180deg, rgba(47,230,179,.26), rgba(16,34,71,1));
border-color:rgba(47,230,179,.42);
}
.tile.noTile{
background:linear-gradient(180deg, rgba(255,77,79,.26), rgba(16,34,71,1));
border-color:rgba(255,77,79,.42);
}

.img{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
}

.img svg{
width:var(--iconSize);
height:var(--iconSize);
opacity:1;
filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));
}

.photo{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
}

.labelWrap{
margin-top:auto;
padding:10px;
display:flex;
justify-content:center;
}
.label{
width:100%;
text-align:center;
font-weight:950;
font-size:var(--labelFont);
padding:10px 12px;
border-radius:16px;
border:1px solid rgba(255,255,255,.18);
background:rgba(0,0,0,.30);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
line-height:1.10;
}

.hint{
margin-top:10px;
color:var(--muted);
font-size:13px;
}

.toast{
position:fixed;
left:50%; transform:translateX(-50%);
bottom:16px;
background:rgba(0,0,0,.75);
border:1px solid rgba(255,255,255,.18);
color:#fff;
padding:10px 14px;
border-radius:999px;
font-weight:800;
opacity:0;
pointer-events:none;
transition:opacity .18s ease;
z-index:50;
}
.toast.on{opacity:1}

#filePick{display:none}

/* Pain scale: one line */
.painBar{
display:none;
gap:10px;
align-items:stretch;
justify-content:space-between;
flex-wrap:nowrap;
overflow:hidden;
margin-bottom:14px;
}
.painBar.on{ display:flex; }
.painBtn{
flex:1 1 0;
min-height:var(--painMinH);
border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:var(--text);
font-weight:950;
font-size:var(--painFont);
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.painBtn.active{
box-shadow:0 0 0 4px rgba(255,255,255,.14) inset;
border-color:rgba(255,255,255,.28);
}
</style>
</head>

<body>
<header>
<div class="row controls">
<div class="title">Ward Talkboard</div>

<button class="chip" id="confirmChip" type="button">Confirm</button>
<button class="chip on" id="soundChip" type="button">Sound</button>
<button class="chip" id="editChip" type="button">Edit</button>
<button class="chip danger" id="resetBtn" type="button">Reset</button>
<button class="chip danger" id="clearBtn" type="button">Clear Photos</button>
</div>

<div class="row pages" id="pageRow">
<button class="chip active" id="pageMove" type="button">Move</button>
<button class="chip" id="pageTeam" type="button">Team</button>
<button class="chip" id="pageEquipment" type="button">Equipment</button>
<button class="chip" id="pageNeeds" type="button">Needs</button>
<button class="chip" id="pagePain" type="button">Pain</button>
</div>

<div class="hint">Tap a tile to speak. <b>Confirm</b> = double-tap. <b>Edit</b> = change label/phrase/photo. Yes/No at the end. Pain scale is one line.</div>
</header>

<main>
<div class="painBar" id="painBar"></div>
<div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast">Saved</div>
<input id="filePick" type="file" accept="image/*" />

<script>
/* =================== CLEAR SIMPLE ICONS (small) =================== */
function iconSVG(name){
const S = `fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"`;
const icons = {
yes:`<svg viewBox="0 0 256 256"><path ${S} d="M54 134l44 44 104-120"/></svg>`,
no:`<svg viewBox="0 0 256 256"><path ${S} d="M70 70l116 116"/><path ${S} d="M186 70L70 186"/></svg>`,
stop:`<svg viewBox="0 0 256 256"><path ${S} d="M94 224V118c0-14 20-14 20 0v54"/><path ${S} d="M114 172V78c0-14 20-14 20 0v94"/><path ${S} d="M134 172V70c0-14 20-14 20 0v102"/><path ${S} d="M154 172V98c0-14 20-14 20 0v74"/><path ${S} d="M174 172V124c0-14 20-14 20 0v48"/><path ${S} d="M94 172c0 30 22 52 52 52h34"/></svg>`,
sit:`<svg viewBox="0 0 256 256"><path ${S} d="M86 62h84v78H86z"/><path ${S} d="M70 140h116v22H70z"/><path ${S} d="M86 162v64"/><path ${S} d="M170 162v64"/></svg>`,
stand:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="56" r="26"/><path ${S} d="M128 82v80"/><path ${S} d="M92 126h72"/><path ${S} d="M128 162l-34 66"/><path ${S} d="M128 162l34 66"/></svg>`,
bed:`<svg viewBox="0 0 256 256"><path ${S} d="M24 170V98h208v72"/><path ${S} d="M24 170h208"/><path ${S} d="M54 98V70h78v28"/></svg>`,
outofbed:`<svg viewBox="0 0 256 256"><path ${S} d="M24 176V110h128v66"/><path ${S} d="M24 176h128"/><path ${S} d="M190 196V96"/><path ${S} d="M162 124l28-28 28 28"/></svg>`,
rest:`<svg viewBox="0 0 256 256"><path ${S} d="M150 60c-26 6-46 30-46 58s20 52 46 58c-40 8-80-22-80-58s40-66 80-58z"/><path ${S} d="M170 70h56"/></svg>`,
callbell:`<svg viewBox="0 0 256 256"><path ${S} d="M128 44c-30 0-52 22-52 52v42l-16 28h136l-16-28V96c0-30-22-52-52-52z"/><path ${S} d="M108 198c4 18 36 18 40 0"/></svg>`,
toilet:`<svg viewBox="0 0 256 256"><path ${S} d="M86 54h60v40H86z"/><path ${S} d="M66 94h124v40c0 34-22 60-56 60h-12c-34 0-56-26-56-60V94z"/></svg>`,
drink:`<svg viewBox="0 0 256 256"><path ${S} d="M86 54h84l-12 160H98L86 54z"/><path ${S} d="M92 106h72"/></svg>`,
food:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="140" r="62"/><path ${S} d="M72 70h112"/></svg>`,
wheelchair:`<svg viewBox="0 0 256 256"><circle ${S} cx="108" cy="72" r="22"/><path ${S} d="M108 94v52h56l22 58"/><circle ${S} cx="112" cy="198" r="34"/></svg>`,
reposition:`<svg viewBox="0 0 256 256"><path ${S} d="M188 92c-16-22-42-36-72-36-48 0-88 40-88 88"/><path ${S} d="M68 164c16 22 42 36 72 36 48 0 88-40 88-88"/></svg>`,
pain:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="128" r="86"/><path ${S} d="M126 72l-30 66h44l-10 46 46-74h-44z"/></svg>`,
help:`<svg viewBox="0 0 256 256"><path ${S} d="M128 30l100 176H28L128 30z"/><path ${S} d="M128 92v58"/></svg>`,
nurse:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="66" r="26"/><path ${S} d="M86 220v-74c0-24 18-44 44-44h0c26 0 44 20 44 44v74"/></svg>`,
doctor:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="64" r="26"/><path ${S} d="M86 220v-76c0-24 18-42 42-42h0c24 0 42 18 42 42v76"/></svg>`,
ot:`<svg viewBox="0 0 256 256"><circle ${S} cx="92" cy="84" r="18"/><circle ${S} cx="164" cy="84" r="18"/><path ${S} d="M74 140c20-22 88-22 108 0"/></svg>`,
pt:`<svg viewBox="0 0 256 256"><circle ${S} cx="96" cy="64" r="22"/><path ${S} d="M96 86l20 38 56 26"/></svg>`,
sp:`<svg viewBox="0 0 256 256"><path ${S} d="M44 78c0-18 14-32 32-32h104c18 0 32 14 32 32v54c0 18-14 32-32 32H124l-34 34v-34H76c-18 0-32-14-32-32V78z"/></svg>`,
};
return icons[name] || icons.help;
}

/* =================== DEFAULT DATA =================== */
const DEFAULT = {
move: [
{id:"sit", label:"Sit", say:"I want to sit up", icon:"sit", photo:null},
{id:"stand", label:"Stand", say:"I want to stand", icon:"stand", photo:null},
{id:"oob", label:"Out of Bed", say:"I want to get out of bed", icon:"outofbed", photo:null},
{id:"inbed", label:"In Bed", say:"I want to stay in bed", icon:"bed", photo:null},
{id:"rest", label:"Rest", say:"I need a rest", icon:"rest", photo:null},
{id:"stop", label:"Stop", say:"Stop please", icon:"stop", photo:null},
],
team: [
{id:"nurse", label:"Nurse", say:"I want the nurse", icon:"nurse", photo:null},
{id:"doctor", label:"Doctor", say:"I want the doctor", icon:"doctor", photo:null},
{id:"ot", label:"OT", say:"I want occupational therapy", icon:"ot", photo:null},
{id:"pt", label:"PT", say:"I want physiotherapy", icon:"pt", photo:null},
{id:"sp", label:"SP", say:"I want speech pathology", icon:"sp", photo:null},
{id:"call", label:"Call Bell", say:"Please use the call bell", icon:"callbell", photo:null},
],
equipment: [
{id:"wheelchair", label:"Wheelchair", say:"I want my wheelchair", icon:"wheelchair", photo:null},
{id:"bed", label:"Bed", say:"Please adjust the bed", icon:"bed", photo:null},
{id:"callbell", label:"Call Bell", say:"Please use the call bell", icon:"callbell", photo:null},
{id:"reposition", label:"Reposition", say:"Please help me change position", icon:"reposition", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
{id:"chair", label:"Chair", say:"I want the chair", icon:"sit", photo:null},
],
needs: [
{id:"drink", label:"Drink", say:"I want a drink", icon:"drink", photo:null},
{id:"food", label:"Food", say:"I am hungry", icon:"food", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
{id:"pain", label:"Pain", say:"I have pain", icon:"pain", photo:null},
{id:"help", label:"HELP", say:"I need help now", icon:"help", photo:null},
],
};

const YES_NO_END = [
{id:"yes_fixed", label:"Yes", say:"Yes", icon:"yes", photo:null, _fixed:true, _yn:"yes"},
{id:"no_fixed", label:"No", say:"No", icon:"no", photo:null, _fixed:true, _yn:"no"},
];

const STORAGE_KEY = "wardTalkboard_v6";

/* =================== STATE =================== */
let state = loadState();
let currentPage = "move";
let confirmMode = false;
let soundOn = true;
let editMode = false;

let pendingEditTile = null;
let confirmPendingId = null;
let confirmTimer = null;

const grid = document.getElementById("grid");
const toast = document.getElementById("toast");
const filePick = document.getElementById("filePick");
const painBar = document.getElementById("painBar");

const confirmChip = document.getElementById("confirmChip");
const soundChip = document.getElementById("soundChip");
const editChip = document.getElementById("editChip");
const resetBtn = document.getElementById("resetBtn");
const clearBtn = document.getElementById("clearBtn");

const pageMove = document.getElementById("pageMove");
const pageTeam = document.getElementById("pageTeam");
const pageEquipment = document.getElementById("pageEquipment");
const pageNeeds = document.getElementById("pageNeeds");
const pagePain = document.getElementById("pagePain");

/* =================== HELPERS =================== */
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

function showToast(msg){
toast.textContent = msg;
toast.classList.add("on");
clearTimeout(showToast._t);
showToast._t = setTimeout(()=>toast.classList.remove("on"), 900);
}

function saveAll(){
try{
localStorage.setItem(STORAGE_KEY, JSON.stringify({
state, currentPage, confirmMode, soundOn, editMode
}));
}catch(e){
showToast("Save blocked");
}
}

function loadState(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(raw){
const parsed = JSON.parse(raw);
if(parsed && parsed.state && parsed.state.move) return parsed.state;
}
}catch(e){}
return deepCopy(DEFAULT);
}

function loadFlags(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(!raw) return;
const parsed = JSON.parse(raw);
if(parsed){
if(typeof parsed.currentPage === "string") currentPage = parsed.currentPage;
if(typeof parsed.confirmMode === "boolean") confirmMode = parsed.confirmMode;
if(typeof parsed.soundOn === "boolean") soundOn = parsed.soundOn;
if(typeof parsed.editMode === "boolean") editMode = parsed.editMode;
}
}catch(e){}
}

function speak(text){
if(!soundOn) return;
try{
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.rate = 0.95;
u.pitch = 1.0;
u.volume = 1.0;
window.speechSynthesis.speak(u);
}catch(e){
showToast("Speech blocked");
}
}

function setChipState(btn, on){
btn.classList.toggle("on", !!on);
}

function setActivePage(page){
currentPage = page;
[pageMove,pageTeam,pageEquipment,pageNeeds,pagePain].forEach(b=>b.classList.remove("active"));
if(page==="move") pageMove.classList.add("active");
if(page==="team") pageTeam.classList.add("active");
if(page==="equipment") pageEquipment.classList.add("active");
if(page==="needs") pageNeeds.classList.add("active");
if(page==="pain") pagePain.classList.add("active");
render();
saveAll();
}

/* Yes/No at the END (not start). Pain page shows pain bar only. */
function tilesForPage(page){
const base = state[page] || [];
if(page === "pain") return []; // pain uses painBar only
return [...base, ...YES_NO_END];
}

/* =================== PAIN BAR (one line 0–10) =================== */
function painColor(n){
// gentle → strong (no emoji)
if(n <= 2) return "rgba(47,230,179,.18)"; // green
if(n <= 5) return "rgba(255,212,59,.18)"; // yellow
if(n <= 7) return "rgba(255,140,0,.18)"; // orange-ish
return "rgba(255,77,79,.18)"; // red
}

function renderPainBar(){
painBar.innerHTML = "";
painBar.classList.add("on");

for(let n=0; n<=10; n++){
const b = document.createElement("button");
b.className = "painBtn";
b.type = "button";
b.textContent = String(n);
b.style.background = painColor(n);
b.addEventListener("click", ()=>{
// speak pain level
speak(`My pain is ${n}`);
// highlight
[...painBar.children].forEach(x=>x.classList.remove("active"));
b.classList.add("active");
});
painBar.appendChild(b);
}
}

/* =================== RENDER =================== */
function render(){
// pain bar on/off
if(currentPage === "pain"){
renderPainBar();
}else{
painBar.classList.remove("on");
painBar.innerHTML = "";
}

grid.innerHTML = "";
const tiles = tilesForPage(currentPage);

tiles.forEach(tile=>{
const el = document.createElement("div");
el.className = "tile";
if(tile._yn === "yes") el.classList.add("yesTile");
if(tile._yn === "no") el.classList.add("noTile");

el.setAttribute("role","button");
el.setAttribute("tabindex","0");

const img = document.createElement("div");
img.className = "img";

// fixed Yes/No never use photos
const effectivePhoto = tile._fixed ? null : tile.photo;

if(effectivePhoto){
const ph = document.createElement("div");
ph.className = "photo";
ph.style.backgroundImage = `url(${effectivePhoto})`;
img.appendChild(ph);
}else{
img.innerHTML = iconSVG(tile.icon);
}

const labelWrap = document.createElement("div");
labelWrap.className = "labelWrap";
const label = document.createElement("div");
label.className = "label";
label.textContent = tile.label;
labelWrap.appendChild(label);

el.appendChild(img);
el.appendChild(labelWrap);

const activate = ()=>{
if(editMode){
if(tile._fixed){
showToast("Yes/No are fixed");
return;
}
editTile(tile);
return;
}

if(confirmMode){
if(confirmPendingId === tile.id){
clearTimeout(confirmTimer);
confirmPendingId = null;
speak(tile.say);
showToast("Spoken");
}else{
confirmPendingId = tile.id;
showToast("Tap again to confirm");
clearTimeout(confirmTimer);
confirmTimer = setTimeout(()=>{ confirmPendingId = null; }, 2200);
}
return;
}

speak(tile.say);
};

el.addEventListener("click", activate);
el.addEventListener("keydown", (ev)=>{
if(ev.key==="Enter" || ev.key===" "){
ev.preventDefault();
activate();
}
});

grid.appendChild(el);
});
}

/* =================== EDIT MODE =================== */
function editTile(tile){
const newLabel = prompt("Button name:", tile.label);
if(newLabel !== null && newLabel.trim() !== ""){
tile.label = newLabel.trim();
}

const newSay = prompt("What it should say:", tile.say);
if(newSay !== null && newSay.trim() !== ""){
tile.say = newSay.trim();
}

pendingEditTile = tile;
setTimeout(()=> filePick.click(), 80);

saveAll();
render();
showToast("Saved text (photo optional)");
}

filePick.addEventListener("change", async (e)=>{
const file = e.target.files && e.target.files[0];
if(!file || !pendingEditTile){
filePick.value = "";
return;
}
const dataUrl = await fileToDataURL(file);
pendingEditTile.photo = dataUrl;
pendingEditTile = null;
filePick.value = "";
saveAll();
render();
showToast("Photo saved");
});

function fileToDataURL(file){
return new Promise((resolve,reject)=>{
const r = new FileReader();
r.onload = ()=>resolve(r.result);
r.onerror = reject;
r.readAsDataURL(file);
});
}

/* =================== CONTROLS =================== */
confirmChip.addEventListener("click", ()=>{
confirmMode = !confirmMode;
setChipState(confirmChip, confirmMode);
saveAll();
});

soundChip.addEventListener("click", ()=>{
soundOn = !soundOn;
setChipState(soundChip, soundOn);
showToast(soundOn ? "Sound ON" : "Sound OFF");
saveAll();
});

editChip.addEventListener("click", ()=>{
editMode = !editMode;
setChipState(editChip, editMode);
showToast(editMode ? "Edit ON" : "Edit OFF");
saveAll();
});

resetBtn.addEventListener("click", ()=>{
if(!confirm("Reset everything to default?")) return;
state = deepCopy(DEFAULT);
confirmMode = false;
soundOn = true;
editMode = false;
setChipState(confirmChip,false);
setChipState(soundChip,true);
setChipState(editChip,false);
confirmPendingId = null;
saveAll();
render();
showToast("Reset done");
});

clearBtn.addEventListener("click", ()=>{
if(!confirm("Clear ONLY custom photos?")) return;
["move","team","equipment","needs"].forEach(p=>{
(state[p]||[]).forEach(t=> t.photo = null);
});
saveAll();
render();
showToast("Photos cleared");
});

/* =================== PAGE BUTTONS =================== */
pageMove.addEventListener("click", ()=> setActivePage("move"));
pageTeam.addEventListener("click", ()=> setActivePage("team"));
pageEquipment.addEventListener("click", ()=> setActivePage("equipment"));
pageNeeds.addEventListener("click", ()=> setActivePage("needs"));
pagePain.addEventListener("click", ()=> setActivePage("pain"));

/* =================== STARTUP =================== */
loadFlags();
setChipState(confirmChip, confirmMode);
setChipState(soundChip, soundOn);
setChipState(editChip, editMode);

setActivePage(currentPage);
render();
</script>
</body>
</html>
