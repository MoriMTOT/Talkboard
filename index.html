<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ward Talkboard (iPad)</title>
<style>
:root{
--bg:#0b1020; --panel:#121a33; --tile:#1b2a57; --tile2:#21346c;
--text:#f2f6ff; --muted:#b7c3e6; --accent:#76a7ff; --danger:#ff6b6b;
--radius:18px;
}
*{ box-sizing:border-box; }
body{
margin:0; background:var(--bg); color:var(--text);
font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
-webkit-font-smoothing:antialiased;
padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
}
header{
display:flex; align-items:flex-start; justify-content:space-between;
gap:10px; padding:10px 6px 12px 6px;
}
.left{ display:flex; flex-direction:column; gap:2px; }
.title{ font-size:18px; font-weight:800; letter-spacing:.2px; }
.sub{ font-size:13px; color:var(--muted); }
.controls{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
button, .chip{
border:none; border-radius:999px; padding:18px 26px;
background:var(--panel); color:var(--text); font-size:22px; min-height:65px; font-weight:700;
touch-action:manipulation;
}
button:active{ transform:scale(0.985); }
.chip{ background:transparent; border:1px solid rgba(255,255,255,.15); }
.chip.on{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(118,167,255,.18) inset; }
main{ max-width:1050px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
.saybar{
background:var(--panel); border-radius:var(--radius); padding:12px;
display:flex; gap:10px; align-items:center; justify-content:space-between;
border:1px solid rgba(255,255,255,.08);
}
.saytext{ display:flex; flex-direction:column; gap:4px; }
#message{ font-size:22px; font-weight:900; line-height:1.12; }
#messageSmall{ font-size:13px; color:var(--muted); font-weight:650; }
.saybtns{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.big{
border-radius:16px; padding:12px 14px; background:var(--tile2);
font-size:16px; font-weight:900;
border:1px solid rgba(255,255,255,.10);
min-width:110px;
}
.danger{ background:rgba(255,107,107,.20); border-color:rgba(255,107,107,.35); }
.row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; }
.tabbar{ display:flex; gap:8px; flex-wrap:wrap; }
.tab{ background:transparent; border:1px solid rgba(255,255,255,.14); }
.tab.on{
border-color:var(--accent);
box-shadow:0 0 0 2px rgba(118,167,255,.16) inset;
}
.grid{
display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;
}
@media (min-width:700px){ .grid{ grid-template-columns:repeat(3, 1fr); } }
@media (min-width:980px){ .grid{ grid-template-columns:repeat(4, 1fr); } }

.tile{
background:var(--tile);
border-radius:var(--radius);
border:1px solid rgba(255,255,255,.10);
overflow:hidden;
min-height:150px;
display:flex; flex-direction:column;
user-select:none; -webkit-user-select:none;
touch-action:manipulation;
}
.img{
flex:1;
background-size:cover;
background-position:center;
display:flex; align-items:flex-end;
padding:10px;
position:relative;
}
.img::before{
content:"";
position:absolute; inset:0;
background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.05));
pointer-events:none;
}
.label{
position:relative;
font-size:18px; font-weight:950; letter-spacing:.2px;
padding:10px 12px;
background:rgba(0,0,0,.18);
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
max-width:100%;
}
.hint{
padding:10px 12px 12px 12px;
font-size:12px; color:rgba(242,246,255,.78);
font-weight:650;
}
.footer{ color:var(--muted); font-size:12px; padding:6px 6px 16px 6px; }

/* Edit overlay */
.modalBack{
position:fixed; inset:0; background:rgba(0,0,0,.55);
display:none; align-items:center; justify-content:center;
padding:16px; z-index:50;
}
.modal{
width:min(560px, 100%);
background:var(--panel);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
padding:14px;
}
.modal h3{ margin:0 0 8px 0; font-size:16px; }
.field{ display:flex; flex-direction:column; gap:6px; margin:10px 0; }
.field label{ font-size:12px; color:var(--muted); font-weight:700; }
.field input[type="text"]{
border-radius:12px; border:1px solid rgba(255,255,255,.14);
background:#0e1530; color:var(--text);
padding:12px; font-size:16px; font-weight:700;
outline:none;
}
.modalBtns{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:12px; }
.ghost{ background:transparent; border:1px solid rgba(255,255,255,.16); }
</style>
</head>
<body>
<header>
<div class="left">
<div class="title">Ward Talkboard</div>
<div class="sub" id="subline">Tap a tile. It will speak.</div>
</div>
<div class="controls">
<button class="chip" id="confirmChip" title="Tap twice to confirm speaking">Confirm</button>
<button class="chip" id="soundChip" title="Speech on/off">Sound: On</button>
<button class="chip" id="editChip" title="Edit tiles (add real photos)">Edit: Off</button>
<button class="chip" id="resetBtn" title="Reset to default tiles">Reset</button>
<button class="chip" id="clearBtn" title="Clear message">Clear</button>
</div>
</header>

<main>
<section class="saybar" aria-label="Message bar">
<div class="saytext">
<div id="message">Tap a picture</div>
<div id="messageSmall">Use Confirm if accidental taps happen.</div>
</div>
<div class="saybtns">
<button class="big" id="speakBtn">Speak</button>
<button class="big danger" id="helpBtn">HELP</button>
</div>
</section>

<section class="row">
<div class="tabbar" id="tabs"></div>
</section>

<section class="grid" id="grid"></section>

<div class="footer">
iPad tip: Share → <b>Add to Home Screen</b> (works like an app icon).<br/>
Edit mode lets you replace any tile with a real photo from the iPad.
</div>
</main>

<!-- Edit Modal -->
<div class="modalBack" id="modalBack" role="dialog" aria-modal="true">
<div class="modal">
<h3>Edit tile</h3>

<div class="field">
<label>Label (big text on tile)</label>
<input type="text" id="editLabel" />
</div>

<div class="field">
<label>Spoken phrase (what it says out loud)</label>
<input type="text" id="editSay" />
</div>

<div class="field">
<label>Photo (optional) — choose a real image</label>
<input type="file" id="editFile" accept="image/*" />
</div>

<div class="modalBtns">
<button class="ghost" id="cancelEdit">Cancel</button>
<button class="ghost danger" id="removePhoto">Remove photo</button>
<button id="saveEdit">Save</button>
</div>
</div>
</div>

name: "Team",
items: [
{ img: IMG.nurse, label: "Nurse", say: "I want the nurse please" },
{ img: IMG.doctor, label: "Doctor", say: "I want the doctor please" },
{ img: IMG.ot, label: "OT", say: "I want occupational therapy please" },
{ img: IMG.pt, label: "PT", say: "I want physiotherapy please" },
{ img: IMG.sp, label: "SP", say: "I want speech pathology please" },
{ img: IMG.help, label: "Call help", say: "I need help now" },
{ img: IMG.again, label: "Again", say: "Please say that again" },
{ img: IMG.wait, label: "Later", say: "Later please" }
]
},
{
name: "Equipment",
items: [
{ img: IMG.wheelchair, label: "Wheelchair", say: "I want my wheelchair" },
{ img: IMG.bed, label: "Bed", say: "I want the bed adjusted" },
{ img: IMG.reposition, label: "Pillows", say: "I need pillows adjusted" },
{ img: IMG.help, label: "Call bell", say: "Please use the call bell" },
{ img: IMG.stop, label: "Too fast", say: "Please slow down" },
{ img: IMG.wait, label: "Hold", say: "Hold on please" },
{ img: IMG.yes, label: "Yes", say: "Yes" },

]
},
{
name: "Needs",
items: [

{ img: IMG.pain, label: "Pain", say: "I have pain" },
{ img: IMG.help, label: "Help", say: "I need help now" },
{ img: IMG.yes, label: "Yes", say: "Yes" },
{ img: IMG.no, label: "No", say: "No" },
{ img: IMG.again, label: "Again", say: "Again please" },
{ img: IMG.wait, label: "Wait", say: "Please wait" }
]
}
];

/* ---------- State ---------- */
let pages = loadSavedPages() || structuredClone(DEFAULT_PAGES);
let currentPage = 0;
let confirmMode = false;
let soundOn = true;
let editMode = false;
let pending = null;

const messageEl = document.getElementById("message");
const messageSmallEl = document.getElementById("messageSmall");
const sublineEl = document.getElementById("subline");
const gridEl = document.getElementById("grid");
const tabsEl = document.getElementById("tabs");

const confirmChip = document.getElementById("confirmChip");
const soundChip = document.getElementById("soundChip");
const editChip = document.getElementById("editChip");
const resetBtn = document.getElementById("resetBtn");
const clearBtn = document.getElementById("clearBtn");
const speakBtn = document.getElementById("speakBtn");
const helpBtn = document.getElementById("helpBtn");

/* ---------- Speech ---------- */
function speak(text){
if(!soundOn) return;
try{
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.rate = 0.95; // slightly slower
u.pitch = 1.0;
window.speechSynthesis.speak(u);
}catch(e){
console.log(e);
}
}

/* ---------- UI ---------- */
function setMessage(text, small=""){
messageEl.textContent = text || "…";
messageSmallEl.textContent = small;
}

function renderTabs(){
tabsEl.innerHTML = "";
pages.forEach((p, idx) => {
const b = document.createElement("button");
b.className = "tab chip" + (idx===currentPage ? " on" : "");
b.textContent = p.name;
b.onclick = () => { currentPage = idx; pending=null; render(); };
tabsEl.appendChild(b);
});
}

function renderGrid(){
gridEl.innerHTML = "";
const items = pages[currentPage].items;

items.forEach((item, idx) => {
const tile = document.createElement("div");
tile.className = "tile";
tile.setAttribute("role","button");
tile.setAttribute("tabindex","0");

const img = document.createElement("div");
img.className = "img";
img.style.backgroundImage = `url('${item.img}')`;

const label = document.createElement("div");
label.className = "label";
label.textContent = item.label;

img.appendChild(label);

const hint = document.createElement("div");
hint.className = "hint";
hint.textContent = editMode
? "Tap to edit photo/phrase"
: (confirmMode ? "Tap twice to speak" : "Tap to speak");

tile.appendChild(img);
tile.appendChild(hint);

tile.onclick = () => {
if(editMode){
openEditModal(currentPage, idx);
return;
}

if(confirmMode){
if(pending && pending.p === currentPage && pending.i === idx){
pending = null;
setMessage(item.say, "");
speak(item.say);
}else{
pending = { p: currentPage, i: idx };
setMessage(item.label, "Tap again to confirm");
speak(item.label);
}
}else{
pending = null;
setMessage(item.say, "");
speak(item.say);
}
};

gridEl.appendChild(tile);
});
}

function render(){
renderTabs();
renderGrid();

sublineEl.textContent = editMode
? "Edit mode: tap a tile to add a real photo / change phrase."
: (confirmMode ? "Tap once to select. Tap again to speak." : "Tap a tile. It will speak.");

confirmChip.classList.toggle("on", confirmMode);
soundChip.classList.toggle("on", soundOn);
editChip.classList.toggle("on", editMode);

soundChip.textContent = soundOn ? "Sound: On" : "Sound: Off";
editChip.textContent = editMode ? "Edit: On" : "Edit: Off";
}

/* ---------- Storage ---------- */
function savePages(){
try{ localStorage.setItem("wardTalkboard.pages.v1", JSON.stringify(pages)); }catch(e){}
}
function loadSavedPages(){
try{
const raw = localStorage.getItem("wardTalkboard.pages.v1");
return raw ? JSON.parse(raw) : null;
}catch(e){ return null; }
}

/* ---------- Controls ---------- */
confirmChip.onclick = () => { confirmMode = !confirmMode; pending=null; render(); };
soundChip.onclick = () => { soundOn = !soundOn; render(); if(soundOn) speak("Sound on"); };
editChip.onclick = () => { editMode = !editMode; pending=null; render(); };
clearBtn.onclick = () => { pending=null; setMessage("…",""); window.speechSynthesis.cancel(); };
speakBtn.onclick = () => { speak(messageEl.textContent === "…" ? " " : messageEl.textContent); };
helpBtn.onclick = () => { pending=null; setMessage("I need help now",""); speak("I need help now"); };

resetBtn.onclick = () => {
pages = structuredClone(DEFAULT_PAGES);
savePages();
pending=null;
setMessage("Reset done", "Default tiles restored.");
speak("Reset done");
render();
};

/* ---------- Edit Modal ---------- */
const modalBack = document.getElementById("modalBack");
const editLabel = document.getElementById("editLabel");
const editSay = document.getElementById("editSay");
const editFile = document.getElementById("editFile");
const cancelEdit = document.getElementById("cancelEdit");
const saveEditBtn = document.getElementById("saveEdit");
const removePhotoBtn = document.getElementById("removePhoto");

let editing = null;

function openEditModal(pageIndex, itemIndex){
editing = { p: pageIndex, i: itemIndex };
const item = pages[pageIndex].items[itemIndex];
editLabel.value = item.label || "";
editSay.value = item.say || "";
editFile.value = "";
modalBack.style.display = "flex";
}

function closeEditModal(){
modalBack.style.display = "none";
editing = null;
}

cancelEdit.onclick = () => closeEditModal();

removePhotoBtn.onclick = () => {
if(!editing) return;
const item = pages[editing.p].items[editing.i];
// If you removed a custom photo, revert to a reasonable default look:
// keep current image if it's one of our IMG, otherwise set a neutral background.
item.img = item.img.startsWith("data:image/svg+xml") ? item.img : IMG.help;
savePages();
setMessage("Photo removed", "");
render();
closeEditModal();
};

saveEditBtn.onclick = async () => {
if(!editing) return;
const item = pages[editing.p].items[editing.i];

item.label = (editLabel.value || "").trim() || item.label;
item.say = (editSay.value || "").trim() || item.say;

// If a file selected, convert to base64 data URL and store.
const file = editFile.files && editFile.files[0];
if(file){
const dataUrl = await fileToDataUrl(file, 1200); // resize-ish for storage
item.img = dataUrl;
}

pages[editing.p].items[editing.i] = item;
savePages();
setMessage("Saved", item.say);
speak("Saved");
render();
closeEditModal();
};

modalBack.addEventListener("click", (e) => {
if(e.target === modalBack) closeEditModal();
});

function fileToDataUrl(file, maxWidth){
return new Promise((resolve, reject) => {
const reader = new FileReader();
reader.onerror = reject;
reader.onload = () => {
const img = new Image();
img.onload = () => {
// Simple resize to reduce storage (keeps aspect ratio).
const scale = Math.min(1, maxWidth / img.width);
const w = Math.round(img.width * scale);
const h = Math.round(img.height * scale);

const canvas = document.createElement("canvas");
canvas.width = w; canvas.height = h;
const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0, w, h);

// JPEG is smaller than PNG for photos.
resolve(canvas.toDataURL("image/jpeg", 0.85));
};
img.onerror = reject;
img.src = reader.result;
};
reader.readAsDataURL(file);
});
}

/* ---------- Start ---------- */
setMessage("Tap a picture", "You can switch to Confirm or add real photos in Edit mode.");
render();
</script>
