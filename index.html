<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ward Talkboard</title>
<style>
:root{
--bg:#0b1020;
--panel:#121a33;
--tile:#172a55;
--tile2:#102247;
--text:#f3f6ff;
--muted:rgba(243,246,255,.75);
--border:rgba(255,255,255,.16);

/* sizes */
--chipFont:22px;
--chipPadY:16px;
--chipPadX:22px;
--chipMinH:64px;

--ctrlFont:16px;
--ctrlPadY:10px;
--ctrlPadX:14px;

--tileMinH:270px;
--labelFont:28px;
--labelPadY:14px;
--labelPadX:16px;
--iconSize:110px;

--gap:22px;
--radius:22px;
}

html,body{height:100%}
body{
margin:0;
font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--text);
}

header{
position:sticky; top:0; z-index:20;
background:linear-gradient(180deg, var(--panel), rgba(18,26,51,.92));
border-bottom:1px solid rgba(255,255,255,.10);
padding:14px 14px calc(12px + env(safe-area-inset-top));
}

.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

.title{
margin-right:auto;
font-weight:800;
letter-spacing:.2px;
color:var(--muted);
font-size:16px;
}

/* controls chips (Confirm, Sound, Edit, Reset, Clear) */
.controls .chip{
font-size:var(--ctrlFont);
padding:var(--ctrlPadY) var(--ctrlPadX);
min-height:44px;
border-radius:999px;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
color:var(--text);
font-weight:800;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.controls .chip.on{
border-color:rgba(118,167,255,.65);
box-shadow:0 0 0 3px rgba(118,167,255,.20) inset;
background:rgba(118,167,255,.10);
}
.controls .danger{
background:rgba(255,77,79,.14);
border-color:rgba(255,77,79,.35);
}

/* page buttons */
.pages{margin-top:12px}
.pages .chip{
font-size:var(--chipFont);
padding:var(--chipPadY) var(--chipPadX);
min-height:var(--chipMinH);
border-radius:999px;
border:none;
font-weight:900;
letter-spacing:.2px;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.pages .chip.active{
box-shadow:0 0 0 5px rgba(255,255,255,.18) inset;
transform:translateY(-1px);
}

/* fixed colours for page chips */
#pageMove{ background:#2b7cff; color:white; }
#pageTeam{ background:#2fe6b3; color:#072018; }
#pageEquipment{ background:#ffd43b; color:#2a2100; }
#pageNeeds{ background:#ff4d4f; color:white; }
#pagePain{ background:#b26bff; color:white; }

main{
padding:18px 18px calc(18px + env(safe-area-inset-bottom));
}

/* ✅ 1 column on iPad by default */
.grid{
display:grid;
grid-template-columns:1fr;
gap:var(--gap);
}
/* allow 2 columns only on big desktop screens */
@media (min-width: 1200px){
.grid{ grid-template-columns:repeat(2, 1fr); }
}
@media (min-width: 1600px){
.grid{ grid-template-columns:repeat(3, 1fr); }
}

.tile{
border:1px solid rgba(255,255,255,.12);
border-radius:var(--radius);
background:linear-gradient(180deg, var(--tile), var(--tile2));
min-height:var(--tileMinH);
overflow:hidden;
display:flex;
flex-direction:column;
position:relative;
touch-action:manipulation;
}

.img{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.img svg{
width:var(--iconSize);
height:var(--iconSize);
opacity:.98;
filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));
}

.photo{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
}

.labelWrap{
margin-top:auto;
padding:14px;
display:flex;
justify-content:center;
}
.label{
max-width:100%;
text-align:center;
font-weight:950;
font-size:var(--labelFont);
padding:var(--labelPadY) var(--labelPadX);
border-radius:18px;
border:1px solid rgba(255,255,255,.18);
background:rgba(0,0,0,.28);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
line-height:1.12;
}

.hint{
margin-top:10px;
color:var(--muted);
font-size:13px;
}

.toast{
position:fixed;
left:50%; transform:translateX(-50%);
bottom:16px;
background:rgba(0,0,0,.75);
border:1px solid rgba(255,255,255,.18);
color:#fff;
padding:10px 14px;
border-radius:999px;
font-weight:800;
opacity:0;
pointer-events:none;
transition:opacity .18s ease;
z-index:50;
}
.toast.on{opacity:1}

#filePick{display:none}
</style>
</head>

<body>
<header>
<div class="row controls">
<div class="title">Ward Talkboard</div>

<button class="chip" id="confirmChip" type="button">Confirm</button>
<button class="chip on" id="soundChip" type="button">Sound</button>
<button class="chip" id="editChip" type="button">Edit</button>
<button class="chip danger" id="resetBtn" type="button">Reset</button>
<button class="chip danger" id="clearBtn" type="button">Clear Photos</button>
</div>

<div class="row pages" id="pageRow">
<button class="chip active" id="pageMove" type="button">Move</button>
<button class="chip" id="pageTeam" type="button">Team</button>
<button class="chip" id="pageEquipment" type="button">Equipment</button>
<button class="chip" id="pageNeeds" type="button">Needs</button>
<button class="chip" id="pagePain" type="button">Pain</button>
</div>

<div class="hint">Tap a tile to speak. <b>Confirm</b> = double-tap. <b>Edit</b> = change label/phrase/photo. Yes/No always first.</div>
</header>

<main>
<div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast">Saved</div>
<input id="filePick" type="file" accept="image/*" />

<script>
/* =================== CLEAR SIMPLE SVG ICONS (high contrast) =================== */
function iconSVG(name){
const S = `fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"`;
const icons = {

pain:`<svg viewBox="0 0 256 256"><path ${S} d="M128 220s-76-44-76-112c0-34 26-60 60-60 22 0 40 14 48 32 8-18 26-32 48-32 34 0 60 26 60 60 0 68-76 112-76 112z"/><path ${S} d="M128 102v44"/><path ${S} d="M128 170h0"/></svg>`,
help:`<svg viewBox="0 0 256 256"><path ${S} d="M128 30l100 176H28L128 30z"/><path ${S} d="M128 92v58"/><path ${S} d="M128 182h0"/></svg>`,
yes:`<svg viewBox="0 0 256 256"><path ${S} d="M54 130l44 44 104-120"/></svg>`,
no:`<svg viewBox="0 0 256 256"><path ${S} d="M70 70l116 116"/><path ${S} d="M186 70L70 186"/></svg>`,
face0:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="128" r="86"/><circle ${S} cx="96" cy="112" r="8"/><circle ${S} cx="160" cy="112" r="8"/><path ${S} d="M96 160h64"/></svg>`,
face5:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="128" r="86"/><circle ${S} cx="96" cy="112" r="8"/><circle ${S} cx="160" cy="112" r="8"/><path ${S} d="M96 168c10-12 54-12 64 0"/></svg>`,
face10:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="128" r="86"/><circle ${S} cx="96" cy="112" r="8"/><circle ${S} cx="160" cy="112" r="8"/><path ${S} d="M94 174c18-22 50-22 68 0"/></svg>`
};
return icons[name] || icons.help;
}

/* =================== DEFAULT DATA =================== */
const DEFAULT = {
move: [
{id:"sit", label:"Sit", say:"I want to sit up", icon:"sit", photo:null},
{id:"stand", label:"Stand", say:"I want to stand", icon:"stand", photo:null},
{id:"oob", label:"Out of Bed", say:"I want to get out of bed", icon:"outofbed", photo:null},
{id:"inbed", label:"In Bed", say:"I want to stay in bed", icon:"inbed", photo:null},
{id:"rest", label:"Rest", say:"I need a rest", icon:"rest", photo:null},
{id:"stop", label:"Stop", say:"Stop please", icon:"stop", photo:null},
],
team: [
{id:"nurse", label:"Nurse", say:"I want the nurse", icon:"nurse", photo:null},
{id:"doctor", label:"Doctor", say:"I want the doctor", icon:"doctor", photo:null},
{id:"ot", label:"OT", say:"I want occupational therapy", icon:"ot", photo:null},
{id:"pt", label:"PT", say:"I want physiotherapy", icon:"pt", photo:null},
{id:"sp", label:"SP", say:"I want speech pathology", icon:"sp", photo:null},
{id:"call", label:"Call", say:"Please call someone", icon:"callbell", photo:null},
],
equipment: [
{id:"wheelchair", label:"Wheelchair", say:"I want my wheelchair", icon:"wheelchair", photo:null},
{id:"bed", label:"Bed", say:"Please adjust the bed", icon:"bed", photo:null},
{id:"callbell", label:"Call Bell", say:"Please use the call bell", icon:"callbell", photo:null},
{id:"chair", label:"Chair", say:"I want the chair", icon:"chair", photo:null},
{id:"reposition", label:"Reposition", say:"Please help me change position", icon:"reposition", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
],
needs: [
{id:"drink", label:"Drink", say:"I want a drink", icon:"drink", photo:null},
{id:"food", label:"Food", say:"I am hungry", icon:"food", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
{id:"pain", label:"Pain", say:"I have pain", icon:"pain", photo:null},
{id:"help", label:"HELP", say:"I need help now", icon:"help", photo:null},
],
pain: [
{id:"pain0", label:"Pain 0", say:"My pain is zero", icon:"face0", photo:null},
{id:"pain1", label:"Pain 1", say:"My pain is one", icon:"face0", photo:null},
{id:"pain2", label:"Pain 2", say:"My pain is two", icon:"face0", photo:null},
{id:"pain3", label:"Pain 3", say:"My pain is three", icon:"face5", photo:null},
{id:"pain4", label:"Pain 4", say:"My pain is four", icon:"face5", photo:null},
{id:"pain5", label:"Pain 5", say:"My pain is five", icon:"face5", photo:null},
{id:"pain6", label:"Pain 6", say:"My pain is six", icon:"face5", photo:null},
{id:"pain7", label:"Pain 7", say:"My pain is seven", icon:"face10", photo:null},
{id:"pain8", label:"Pain 8", say:"My pain is eight", icon:"face10", photo:null},
{id:"pain9", label:"Pain 9", say:"My pain is nine", icon:"face10", photo:null},
{id:"pain10", label:"Pain 10", say:"My pain is ten", icon:"face10", photo:null},
{id:"where", label:"Where?", say:"My pain is here", icon:"pain", photo:null},
],
};

/* ✅ Yes/No fixed first buttons on every page */
const FIXED_YN = [
{id:"yes_fixed", label:"Yes", say:"Yes", icon:"yes", photo:null, _fixed:true},
{id:"no_fixed", label:"No", say:"No", icon:"no", photo:null, _fixed:true},
];

const STORAGE_KEY = "wardTalkboard_v4";

/* =================== STATE =================== */
let state = loadState();
let currentPage = "move";
let confirmMode = false;
let soundOn = true;
let editMode = false;

let pendingEditTile = null;
let confirmPendingId = null;
let confirmTimer = null;

const grid = document.getElementById("grid");
const toast = document.getElementById("toast");
const filePick = document.getElementById("filePick");

const confirmChip = document.getElementById("confirmChip");
const soundChip = document.getElementById("soundChip");
const editChip = document.getElementById("editChip");
const resetBtn = document.getElementById("resetBtn");
const clearBtn = document.getElementById("clearBtn");

const pageMove = document.getElementById("pageMove");
const pageTeam = document.getElementById("pageTeam");
const pageEquipment = document.getElementById("pageEquipment");
const pageNeeds = document.getElementById("pageNeeds");
const pagePain = document.getElementById("pagePain");

/* =================== HELPERS =================== */
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

function showToast(msg){
toast.textContent = msg;
toast.classList.add("on");
clearTimeout(showToast._t);
showToast._t = setTimeout(()=>toast.classList.remove("on"), 900);
}

function saveAll(){
try{
localStorage.setItem(STORAGE_KEY, JSON.stringify({
state, currentPage, confirmMode, soundOn, editMode
}));
}catch(e){
showToast("Save blocked");
}
}

function loadState(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(raw){
const parsed = JSON.parse(raw);
if(parsed && parsed.state && parsed.state.move) return parsed.state;
}
}catch(e){}
return deepCopy(DEFAULT);
}

function loadFlags(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(!raw) return;
const parsed = JSON.parse(raw);
if(parsed){
if(typeof parsed.currentPage === "string") currentPage = parsed.currentPage;
if(typeof parsed.confirmMode === "boolean") confirmMode = parsed.confirmMode;
if(typeof parsed.soundOn === "boolean") soundOn = parsed.soundOn;
if(typeof parsed.editMode === "boolean") editMode = parsed.editMode;
}
}catch(e){}
}

function speak(text){
if(!soundOn) return;
try{
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.rate = 0.95;
u.pitch = 1.0;
u.volume = 1.0;
window.speechSynthesis.speak(u);
}catch(e){
showToast("Speech blocked");
}
}

function setChipState(btn, on){
btn.classList.toggle("on", !!on);
}

function setActivePage(page){
currentPage = page;
[pageMove,pageTeam,pageEquipment,pageNeeds,pagePain].forEach(b=>b.classList.remove("active"));
if(page==="move") pageMove.classList.add("active");
if(page==="team") pageTeam.classList.add("active");
if(page==="equipment") pageEquipment.classList.add("active");
if(page==="needs") pageNeeds.classList.add("active");
if(page==="pain") pagePain.classList.add("active");
render();
saveAll();
}

/* =================== TILE LIST (Yes/No first) =================== */
function tilesForPage(page){
const base = state[page] || [];
// put Yes/No first, then the page tiles
return [...FIXED_YN, ...base];
}

/* =================== RENDER =================== */
function render(){
grid.innerHTML = "";
const tiles = tilesForPage(currentPage);

tiles.forEach(tile=>{
const el = document.createElement("div");
el.className = "tile";
el.setAttribute("role","button");
el.setAttribute("tabindex","0");

const img = document.createElement("div");
img.className = "img";

// fixed Yes/No never use photos
const effectivePhoto = tile._fixed ? null : tile.photo;

if(effectivePhoto){
const ph = document.createElement("div");
ph.className = "photo";
ph.style.backgroundImage = `url(${effectivePhoto})`;
img.appendChild(ph);
}else{
img.innerHTML = iconSVG(tile.icon);
}

const labelWrap = document.createElement("div");
labelWrap.className = "labelWrap";
const label = document.createElement("div");
label.className = "label";
label.textContent = tile.label;
labelWrap.appendChild(label);

el.appendChild(img);
el.appendChild(labelWrap);

const activate = ()=>{
if(editMode){
if(tile._fixed){
showToast("Yes/No are fixed");
return;
}
editTile(tile);
return;
}

if(confirmMode){
if(confirmPendingId === tile.id){
clearTimeout(confirmTimer);
confirmPendingId = null;
speak(tile.say);
showToast("Spoken");
}else{
confirmPendingId = tile.id;
showToast("Tap again to confirm");
clearTimeout(confirmTimer);
confirmTimer = setTimeout(()=>{ confirmPendingId = null; }, 2200);
}
return;
}

speak(tile.say);
};

el.addEventListener("click", activate);
el.addEventListener("keydown", (ev)=>{
if(ev.key==="Enter" || ev.key===" "){
ev.preventDefault();
activate();
}
});

grid.appendChild(el);
});
}

/* =================== EDIT MODE =================== */
function editTile(tile){
const newLabel = prompt("Button name:", tile.label);
if(newLabel !== null && newLabel.trim() !== ""){
tile.label = newLabel.trim();
}

const newSay = prompt("What it should say:", tile.say);
if(newSay !== null && newSay.trim() !== ""){
tile.say = newSay.trim();
}

pendingEditTile = tile;
setTimeout(()=> filePick.click(), 80);

saveAll();
render();
showToast("Saved text (photo optional)");
}

filePick.addEventListener("change", async (e)=>{
const file = e.target.files && e.target.files[0];
if(!file || !pendingEditTile){
filePick.value = "";
return;
}
const dataUrl = await fileToDataURL(file);
pendingEditTile.photo = dataUrl;
pendingEditTile = null;
filePick.value = "";
saveAll();
render();
showToast("Photo saved");
});

function fileToDataURL(file){
return new Promise((resolve,reject)=>{
const r = new FileReader();
r.onload = ()=>resolve(r.result);
r.onerror = reject;
r.readAsDataURL(file);
});
}

/* =================== CONTROLS =================== */
confirmChip.addEventListener("click", ()=>{
confirmMode = !confirmMode;
setChipState(confirmChip, confirmMode);
saveAll();
});

soundChip.addEventListener("click", ()=>{
soundOn = !soundOn;
setChipState(soundChip, soundOn);
showToast(soundOn ? "Sound ON" : "Sound OFF");
saveAll();
});

editChip.addEventListener("click", ()=>{
editMode = !editMode;
setChipState(editChip, editMode);
showToast(editMode ? "Edit ON" : "Edit OFF");
saveAll();
});

resetBtn.addEventListener("click", ()=>{
if(!confirm("Reset everything to default?")) return;
state = deepCopy(DEFAULT);
confirmMode = false;
soundOn = true;
editMode = false;
setChipState(confirmChip,false);
setChipState(soundChip,true);
setChipState(editChip,false);
confirmPendingId = null;
saveAll();
render();
showToast("Reset done");
});

clearBtn.addEventListener("click", ()=>{
if(!confirm("Clear ONLY custom photos?")) return;
["move","team","equipment","needs","pain"].forEach(p=>{
(state[p]||[]).forEach(t=> t.photo = null);
});
saveAll();
render();
showToast("Photos cleared");
});

/* =================== PAGE BUTTONS =================== */
pageMove.addEventListener("click", ()=> setActivePage("move"));
pageTeam.addEventListener("click", ()=> setActivePage("team"));
pageEquipment.addEventListener("click", ()=> setActivePage("equipment"));
pageNeeds.addEventListener("click", ()=> setActivePage("needs"));
pagePain.addEventListener("click", ()=> setActivePage("pain"));

/* =================== STARTUP =================== */
loadFlags();
setChipState(confirmChip, confirmMode);
setChipState(soundChip, soundOn);
setChipState(editChip, editMode);

setActivePage(currentPage);
render();
</script>
</body>
</html>
