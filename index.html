<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>M C U Talkboard</title>

<style>
:root{
--bg:#0b1020;
--panel:#121a33;
--tile:#172a55;
--tile2:#102247;
--text:#f3f6ff;
--muted:rgba(243,246,255,.75);
--border:rgba(255,255,255,.16);

/* Page chips */
--chipFont:22px;
--chipPadY:14px;
--chipPadX:20px;
--chipMinH:58px;

/* Control chips */
--ctrlFont:16px;
--ctrlPadY:10px;
--ctrlPadX:14px;

/* ✅ Adjustable UI sizes */
--tileSize: 210px; /* square tile side. adjust via Sizes panel */
--iconSize: 52px; /* icon size */
--frameW: 120px; /* photo frame width */
--frameH: 92px; /* photo frame height */

--gap:14px;
--tileRadius:16px;

/* ✅ label safe height so it never clips */
--labelFont:24px;
--labelAreaPad:10px;
--labelMinH:72px;

/* Pain bar */
--painFont:20px;
--painMinH:56px;
}

html,body{height:100%}
body{
margin:0;
font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--text);
}

header{
position:sticky; top:0; z-index:20;
background:linear-gradient(180deg, var(--panel), rgba(18,26,51,.92));
border-bottom:1px solid rgba(255,255,255,.10);
padding:14px 14px calc(12px + env(safe-area-inset-top));
}

.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

.title{
margin-right:auto;
font-weight:800;
letter-spacing:.2px;
color:var(--muted);
font-size:16px;
}

/* Controls */
.controls .chip{
font-size:var(--ctrlFont);
padding:var(--ctrlPadY) var(--ctrlPadX);
min-height:44px;
border-radius:999px;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
color:var(--text);
font-weight:800;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.controls .chip.on{
border-color:rgba(118,167,255,.65);
box-shadow:0 0 0 3px rgba(118,167,255,.20) inset;
background:rgba(118,167,255,.10);
}
.controls .danger{
background:rgba(255,77,79,.14);
border-color:rgba(255,77,79,.35);
}

/* Page buttons */
.pages{margin-top:12px}
.pages .chip{
font-size:var(--chipFont);
padding:var(--chipPadY) var(--chipPadX);
min-height:var(--chipMinH);
border-radius:999px;
border:none;
font-weight:950;
letter-spacing:.2px;
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
}
.pages .chip.active{
box-shadow:0 0 0 5px rgba(255,255,255,.18) inset;
transform:translateY(-1px);
}

/* fixed colours for page chips */
#pageMove{ background:#2b7cff; color:white; }
#pageTeam{ background:#2fe6b3; color:#062218; }
#pageEquipment{ background:#ffd43b; color:#2a2100; }
#pageNeeds{ background:#ff4d4f; color:white; }
#pagePain{ background:#b26bff; color:white; }

main{
padding:14px 14px calc(14px + env(safe-area-inset-bottom));
}

/* ✅ CAP TILE SIZE to avoid scroll on iPad */
.grid{
display:grid;
grid-template-columns:repeat(3, minmax(0, var(--tileSize)));
gap:var(--gap);
justify-content:center; /* centers grid so extra width doesn't enlarge tiles */
align-content:start;
}
@media (max-width: 520px){
.grid{ grid-template-columns:repeat(2, minmax(0, var(--tileSize))); }
}

/* ✅ square tile */
.tile{
width:var(--tileSize);
height:var(--tileSize);
border:1px solid rgba(255,255,255,.12);
border-radius:var(--tileRadius);
background:linear-gradient(180deg, var(--tile), var(--tile2));
overflow:hidden;
display:flex;
flex-direction:column;
touch-action:manipulation;
}

.tile.yesTile{
background:linear-gradient(180deg, rgba(47,230,179,.22), rgba(16,34,71,1));
border-color:rgba(47,230,179,.42);
}
.tile.noTile{
background:linear-gradient(180deg, rgba(255,77,79,.22), rgba(16,34,71,1));
border-color:rgba(255,77,79,.42);
}

/* media area (top) */
.mediaArea{
flex:1 1 auto;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
}

/* ✅ centered frame */
.frame{
width:var(--frameW);
height:var(--frameH);
border-radius:14px;
border:1px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.06);
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.frame img{
width:100%;
height:100%;
object-fit:contain; /* change to cover if you prefer fill/crop */
object-position:center;
background:transparent;
}

.frame svg{
width:var(--iconSize);
height:var(--iconSize);
filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));
}

/* ✅ label area (bottom) fixed safe height so border never clips */
.labelArea{
flex:0 0 auto;
min-height:var(--labelMinH);
padding:var(--labelAreaPad);
border-top:1px solid rgba(255,255,255,.10);
background:rgba(0,0,0,.18);
display:flex;
align-items:center;
justify-content:center;
}
.label{
width:100%;
text-align:center;
font-weight:950;
font-size:var(--labelFont);
line-height:1.10;
padding:10px 12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.16);
background:rgba(255,255,255,.06);
box-sizing:border-box;
}

.hint{
margin-top:10px;
color:var(--muted);
font-size:13px;
}

.toast{
position:fixed;
left:50%; transform:translateX(-50%);
bottom:16px;
background:rgba(0,0,0,.75);
border:1px solid rgba(255,255,255,.18);
color:#fff;
padding:10px 14px;
border-radius:999px;
font-weight:800;
opacity:0;
pointer-events:none;
transition:opacity .18s ease;
z-index:50;
}
.toast.on{opacity:1}

#filePick{display:none}

/* Pain scale (one line) */
.painWrap{ display:none; margin-bottom:14px; }
.painWrap.on{ display:block; }
.painTop{
display:flex;
justify-content:space-between;
margin-bottom:8px;
color:rgba(243,246,255,.85);
font-weight:900;
font-size:14px;
}
.painRow{
display:flex;
gap:6px;
width:100%;
}
.painBtn{
flex:1 1 0;
min-height:var(--painMinH);
border-radius:0;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:var(--text);
font-weight:950;
font-size:var(--painFont);
touch-action:manipulation;
user-select:none;
-webkit-user-select:none;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
padding:0;
}
.painBtn.left{ border-radius:14px 0 0 14px; }
.painBtn.right{ border-radius:0 14px 14px 0; }
.painBtn.active{
box-shadow:0 0 0 4px rgba(255,255,255,.14) inset;
border-color:rgba(255,255,255,.28);
}

/* EDIT PANEL */
.modal{
position:fixed; inset:0;
background:rgba(0,0,0,.55);
display:none;
align-items:flex-end;
justify-content:center;
z-index:100;
padding:12px 12px calc(12px + env(safe-area-inset-bottom));
}
.modal.on{ display:flex; }
.sheet{
width:min(720px, 100%);
background:rgba(18,26,51,.98);
border:1px solid rgba(255,255,255,.16);
border-radius:20px;
padding:14px;
}
.sheet h3{
margin:0 0 10px 0;
font-size:16px;
color:rgba(243,246,255,.85);
letter-spacing:.2px;
}
.field{
display:flex;
flex-direction:column;
gap:6px;
margin-bottom:10px;
}
.field label{
font-size:13px;
color:rgba(243,246,255,.75);
font-weight:800;
}
.field input, .field input[type="range"]{
height:44px;
border-radius:12px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:var(--text);
padding:0 12px;
font-size:16px;
font-weight:700;
outline:none;
box-sizing:border-box;
width:100%;
}
.rangeRow{
display:flex;
gap:10px;
align-items:center;
}
.rangeValue{
min-width:54px;
text-align:right;
font-weight:900;
color:rgba(243,246,255,.85);
}
.sheetActions{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:flex-end;
margin-top:10px;
}
.btn{
border-radius:999px;
border:1px solid rgba(255,255,255,.16);
background:rgba(255,255,255,.08);
color:var(--text);
height:44px;
padding:0 14px;
font-weight:900;
font-size:14px;
touch-action:manipulation;
}
.btn.primary{
border-color:rgba(118,167,255,.55);
background:rgba(118,167,255,.14);
}
.btn.danger{
border-color:rgba(255,77,79,.45);
background:rgba(255,77,79,.14);
}
</style>
</head>

<body>
<header>
<div class="row controls">
<div class="title">Ward Talkboard</div>
<button class="chip" id="confirmChip" type="button">Confirm</button>
<button class="chip on" id="soundChip" type="button">Sound</button>
<button class="chip" id="editChip" type="button">Edit</button>
<button class="chip" id="sizeChip" type="button">Sizes</button>

</div>

<div class="row pages" id="pageRow">
<button class="chip active" id="pageMove" type="button">Move</button>
<button class="chip" id="pageTeam" type="button">Team</button>
<button class="chip" id="pageEquipment" type="button">Equipment</button>
<button class="chip" id="pageNeeds" type="button">Needs</button>
<button class="chip" id="pagePain" type="button">Pain</button>
</div>

<div class="hint">No scroll: tile size is capped. Sizes → adjust icon and tile size anytime.</div>
</header>

<main>
<div class="painWrap" id="painWrap">
<div class="painTop"><span>No pain</span><span>Worst pain</span></div>
<div class="painRow" id="painRow"></div>
</div>

<div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast">Saved</div>
<input id="filePick" type="file" accept="image/*" />

<!-- Edit Modal -->
<div class="modal" id="editModal">
<div class="sheet">
<h3>Edit button</h3>

<div class="field">
<label for="editLabel">Button name</label>
<input id="editLabel" autocomplete="off" />
</div>

<div class="field">
<label for="editSay">What it should say</label>
<input id="editSay" autocomplete="off" />
</div>

<div class="sheetActions">
<button class="btn" id="photoBtn" type="button">Choose photo</button>
<button class="btn danger" id="removePhotoBtn" type="button">Remove photo</button>
<button class="btn" id="cancelBtn" type="button">Cancel</button>
<button class="btn primary" id="saveBtn" type="button">Save</button>
</div>
</div>
</div>

<!-- Sizes Modal -->
<div class="modal" id="sizeModal">
<div class="sheet">
<h3>Sizes</h3>

<div class="field">
<label>Tile size (square)</label>
<div class="rangeRow">
<input id="tileSizeRange" type="range" min="150" max="240" step="2" />
<div class="rangeValue" id="tileSizeVal"></div>
</div>
</div>

<div class="field">
<label>Icon size</label>
<div class="rangeRow">
<input id="iconSizeRange" type="range" min="34" max="90" step="2" />
<div class="rangeValue" id="iconSizeVal"></div>
</div>
</div>

<div class="field">
<label>Photo frame size</label>
<div class="rangeRow">
<input id="frameSizeRange" type="range" min="80" max="150" step="2" />
<div class="rangeValue" id="frameSizeVal"></div>
</div>
</div>

<div class="sheetActions">
<button class="btn" id="sizeCancelBtn" type="button">Close</button>
<button class="btn primary" id="sizeSaveBtn" type="button">Save</button>
</div>
</div>
</div>

<script>
/* ===== Icons ===== */
function iconSVG(name){
const S = `fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"`;
const icons = {
yes:`<svg viewBox="0 0 256 256"><path ${S} d="M54 134l44 44 104-120"/></svg>`,
no:`<svg viewBox="0 0 256 256"><path ${S} d="M70 70l116 116"/><path ${S} d="M186 70L70 186"/></svg>`,
stop:`<svg viewBox="0 0 256 256"><path ${S} d="M94 224V118c0-14 20-14 20 0v54"/><path ${S} d="M114 172V78c0-14 20-14 20 0v94"/><path ${S} d="M134 172V70c0-14 20-14 20 0v102"/><path ${S} d="M154 172V98c0-14 20-14 20 0v74"/><path ${S} d="M174 172V124c0-14 20-14 20 0v48"/><path ${S} d="M94 172c0 30 22 52 52 52h34"/></svg>`,
sit:`<svg viewBox="0 0 256 256"><path ${S} d="M86 62h84v78H86z"/><path ${S} d="M70 140h116v22H70z"/><path ${S} d="M86 162v64"/><path ${S} d="M170 162v64"/></svg>`,
stand:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="56" r="26"/><path ${S} d="M128 82v80"/><path ${S} d="M92 126h72"/><path ${S} d="M128 162l-34 66"/><path ${S} d="M128 162l34 66"/></svg>`,
bed:`<svg viewBox="0 0 256 256"><path ${S} d="M24 170V98h208v72"/><path ${S} d="M24 170h208"/><path ${S} d="M54 98V70h78v28"/></svg>`,
outofbed:`<svg viewBox="0 0 256 256"><path ${S} d="M24 176V110h128v66"/><path ${S} d="M24 176h128"/><path ${S} d="M190 196V96"/><path ${S} d="M162 124l28-28 28 28"/></svg>`,
rest:`<svg viewBox="0 0 256 256"><path ${S} d="M150 60c-26 6-46 30-46 58s20 52 46 58c-40 8-80-22-80-58s40-66 80-58z"/><path ${S} d="M170 70h56"/></svg>`,
callbell:`<svg viewBox="0 0 256 256"><path ${S} d="M128 44c-30 0-52 22-52 52v42l-16 28h136l-16-28V96c0-30-22-52-52-52z"/><path ${S} d="M108 198c4 18 36 18 40 0"/></svg>`,
toilet:`<svg viewBox="0 0 256 256"><path ${S} d="M86 54h60v40H86z"/><path ${S} d="M66 94h124v40c0 34-22 60-56 60h-12c-34 0-56-26-56-60V94z"/></svg>`,
drink:`<svg viewBox="0 0 256 256"><path ${S} d="M86 54h84l-12 160H98L86 54z"/><path ${S} d="M92 106h72"/></svg>`,
food:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="140" r="62"/><path ${S} d="M72 70h112"/></svg>`,
wheelchair:`<svg viewBox="0 0 256 256"><circle ${S} cx="108" cy="72" r="22"/><path ${S} d="M108 94v52h56l22 58"/><circle ${S} cx="112" cy="198" r="34"/></svg>`,
reposition:`<svg viewBox="0 0 256 256"><path ${S} d="M188 92c-16-22-42-36-72-36-48 0-88 40-88 88"/><path ${S} d="M68 164c16 22 42 36 72 36 48 0 88-40 88-88"/></svg>`,
pain:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="128" r="86"/><path ${S} d="M126 72l-30 66h44l-10 46 46-74h-44z"/></svg>`,
help:`<svg viewBox="0 0 256 256"><path ${S} d="M128 30l100 176H28L128 30z"/><path ${S} d="M128 92v58"/></svg>`,
nurse:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="66" r="26"/><path ${S} d="M86 220v-74c0-24 18-44 44-44h0c26 0 44 20 44 44v74"/></svg>`,
doctor:`<svg viewBox="0 0 256 256"><circle ${S} cx="128" cy="64" r="26"/><path ${S} d="M86 220v-76c0-24 18-42 42-42h0c24 0 42 18 42 42v76"/></svg>`,
ot:`<svg viewBox="0 0 256 256"><circle ${S} cx="92" cy="84" r="18"/><circle ${S} cx="164" cy="84" r="18"/><path ${S} d="M74 140c20-22 88-22 108 0"/></svg>`,
pt:`<svg viewBox="0 0 256 256"><circle ${S} cx="96" cy="64" r="22"/><path ${S} d="M96 86l20 38 56 26"/></svg>`,
sp:`<svg viewBox="0 0 256 256"><path ${S} d="M44 78c0-18 14-32 32-32h104c18 0 32 14 32 32v54c0 18-14 32-32 32H124l-34 34v-34H76c-18 0-32-14-32-32V78z"/></svg>`,
};
return icons[name] || icons.help;
}

/* ===== Defaults ===== */
const DEFAULT = {
move: [
{id:"sit", label:"Sit", say:"I want to sit up", icon:"sit", photo:null},
{id:"stand", label:"Stand", say:"I want to stand", icon:"stand", photo:null},
{id:"oob", label:"Out of Bed", say:"I want to get out of bed", icon:"outofbed", photo:null},
{id:"inbed", label:"In Bed", say:"I want to stay in bed", icon:"bed", photo:null},
{id:"rest", label:"Rest", say:"I need a rest", icon:"rest", photo:null},
{id:"stop", label:"Stop", say:"Stop please", icon:"stop", photo:null},
],
team: [
{id:"nurse", label:"Nurse", say:"I want the nurse", icon:"nurse", photo:null},
{id:"doctor", label:"Doctor", say:"I want the doctor", icon:"doctor", photo:null},
{id:"ot", label:"OT", say:"I want occupational therapy", icon:"ot", photo:null},
{id:"pt", label:"PT", say:"I want physiotherapy", icon:"pt", photo:null},
{id:"sp", label:"SP", say:"I want speech pathology", icon:"sp", photo:null},
{id:"call", label:"Call Bell", say:"Please use the call bell", icon:"callbell", photo:null},
],
equipment: [
{id:"wheelchair", label:"Wheelchair", say:"I want my wheelchair", icon:"wheelchair", photo:null},
{id:"bed", label:"Bed", say:"Please adjust the bed", icon:"bed", photo:null},
{id:"callbell", label:"Call Bell", say:"Please use the call bell", icon:"callbell", photo:null},
{id:"reposition", label:"Reposition", say:"Please help me change position", icon:"reposition", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
{id:"chair", label:"Chair", say:"I want the chair", icon:"sit", photo:null},
],
needs: [
{id:"drink", label:"Drink", say:"I want a drink", icon:"drink", photo:null},
{id:"food", label:"Food", say:"I am hungry", icon:"food", photo:null},
{id:"toilet", label:"Toilet", say:"I need the toilet", icon:"toilet", photo:null},
{id:"pain", label:"Pain", say:"I have pain", icon:"pain", photo:null},
{id:"help", label:"HELP", say:"I need help now", icon:"help", photo:null},
],
};

const YES_NO_END = [
{id:"yes_fixed", label:"Yes", say:"Yes", icon:"yes", photo:null, _fixed:true, _yn:"yes"},
{id:"no_fixed", label:"No", say:"No", icon:"no", photo:null, _fixed:true, _yn:"no"},
];

const STORAGE_KEY = "wardTalkboard_v9";
const UI_KEY = "wardTalkboard_ui_v1";

/* ===== State ===== */
let state = loadState();
let currentPage = "move";
let confirmMode = false;
let soundOn = true;
let editMode = false;

let confirmPendingId = null;
let confirmTimer = null;

let editingTile = null;

const grid = document.getElementById("grid");
const toast = document.getElementById("toast");
const filePick = document.getElementById("filePick");

const painWrap = document.getElementById("painWrap");
const painRow = document.getElementById("painRow");

const confirmChip = document.getElementById("confirmChip");
const soundChip = document.getElementById("soundChip");
const editChip = document.getElementById("editChip");
const sizeChip = document.getElementById("sizeChip");
const resetBtn = document.getElementById("resetBtn");
const clearBtn = document.getElementById("clearBtn");

const pageMove = document.getElementById("pageMove");
const pageTeam = document.getElementById("pageTeam");
const pageEquipment = document.getElementById("pageEquipment");
const pageNeeds = document.getElementById("pageNeeds");
const pagePain = document.getElementById("pagePain");

/* Edit Modal */
const editModal = document.getElementById("editModal");
const editLabel = document.getElementById("editLabel");
const editSay = document.getElementById("editSay");
const photoBtn = document.getElementById("photoBtn");
const removePhotoBtn = document.getElementById("removePhotoBtn");
const cancelBtn = document.getElementById("cancelBtn");
const saveBtn = document.getElementById("saveBtn");

/* Sizes Modal */
const sizeModal = document.getElementById("sizeModal");
const tileSizeRange = document.getElementById("tileSizeRange");
const iconSizeRange = document.getElementById("iconSizeRange");
const frameSizeRange = document.getElementById("frameSizeRange");
const tileSizeVal = document.getElementById("tileSizeVal");
const iconSizeVal = document.getElementById("iconSizeVal");
const frameSizeVal = document.getElementById("frameSizeVal");
const sizeCancelBtn = document.getElementById("sizeCancelBtn");
const sizeSaveBtn = document.getElementById("sizeSaveBtn");

/* ===== Helpers ===== */
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

function showToast(msg){
toast.textContent = msg;
toast.classList.add("on");
clearTimeout(showToast._t);
showToast._t = setTimeout(()=>toast.classList.remove("on"), 900);
}

function saveAll(){
try{
localStorage.setItem(STORAGE_KEY, JSON.stringify({
state, currentPage, confirmMode, soundOn, editMode
}));
}catch(e){
showToast("Save blocked");
}
}

function loadState(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(raw){
const parsed = JSON.parse(raw);
if(parsed && parsed.state && parsed.state.move) return parsed.state;
}
}catch(e){}
return deepCopy(DEFAULT);
}

function loadFlags(){
try{
const raw = localStorage.getItem(STORAGE_KEY);
if(!raw) return;
const parsed = JSON.parse(raw);
if(parsed){
if(typeof parsed.currentPage === "string") currentPage = parsed.currentPage;
if(typeof parsed.confirmMode === "boolean") confirmMode = parsed.confirmMode;
if(typeof parsed.soundOn === "boolean") soundOn = parsed.soundOn;
if(typeof parsed.editMode === "boolean") editMode = parsed.editMode;
}
}catch(e){}
}

function speak(text){
if(!soundOn) return;
try{
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.rate = 0.95;
u.pitch = 1.0;
u.volume = 1.0;
window.speechSynthesis.speak(u);
}catch(e){
showToast("Speech blocked");
}
}

function setChipState(btn, on){
btn.classList.toggle("on", !!on);
}

function setActivePage(page){
currentPage = page;
[pageMove,pageTeam,pageEquipment,pageNeeds,pagePain].forEach(b=>b.classList.remove("active"));
if(page==="move") pageMove.classList.add("active");
if(page==="team") pageTeam.classList.add("active");
if(page==="equipment") pageEquipment.classList.add("active");
if(page==="needs") pageNeeds.classList.add("active");
if(page==="pain") pagePain.classList.add("active");
render();
saveAll();
}

function tilesForPage(page){
const base = state[page] || [];
if(page === "pain") return [];
return [...base, ...YES_NO_END];
}

/* ===== Pain bar ===== */
function painColor(n){
if(n <= 2) return "rgba(47,230,179,.18)";
if(n <= 5) return "rgba(255,212,59,.18)";
if(n <= 7) return "rgba(255,140,0,.18)";
return "rgba(255,77,79,.18)";
}
function faceSVG(level){
const S = `fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"`;
if(level===0){
return `<svg viewBox="0 0 256 256" width="22" height="22">
<circle ${S} cx="128" cy="128" r="90"/>
<circle ${S} cx="96" cy="112" r="6"/><circle ${S} cx="160" cy="112" r="6"/>
<path ${S} d="M92 162h72"/>
</svg>`;
}
if(level===5){
return `<svg viewBox="0 0 256 256" width="22" height="22">
<circle ${S} cx="128" cy="128" r="90"/>
<circle ${S} cx="96" cy="112" r="6"/><circle ${S} cx="160" cy="112" r="6"/>
<path ${S} d="M92 170c16-12 56-12 72 0"/>
</svg>`;
}
return `<svg viewBox="0 0 256 256" width="22" height="22">
<circle ${S} cx="128" cy="128" r="90"/>
<circle ${S} cx="96" cy="112" r="6"/><circle ${S} cx="160" cy="112" r="6"/>
<path ${S} d="M92 178c18-20 54-20 72 0"/>
</svg>`;
}
function renderPainBar(){
painRow.innerHTML = "";
for(let n=0; n<=10; n++){
const b = document.createElement("button");
b.className = "painBtn";
b.type = "button";
b.style.background = painColor(n);
if(n===0) b.classList.add("left");
if(n===10) b.classList.add("right");

if(n===0 || n===5 || n===10){
const span = document.createElement("span");
span.innerHTML = faceSVG(n);
b.appendChild(span);
}

const t = document.createElement("span");
t.textContent = String(n);
b.appendChild(t);

b.addEventListener("click", ()=>{
speak(`My pain is ${n}`);
[...painRow.children].forEach(x=>x.classList.remove("active"));
b.classList.add("active");
});

painRow.appendChild(b);
}
}

/* ===== Edit modal ===== */
function openEditor(tile){
editingTile = tile;
editLabel.value = tile.label || "";
editSay.value = tile.say || "";
editModal.classList.add("on");
setTimeout(()=>editLabel.focus(), 80);
}
function closeEditor(){
editModal.classList.remove("on");
editingTile = null;
}

photoBtn.addEventListener("click", ()=>{
if(!editingTile) return;
filePick.value = "";
filePick.click();
});
removePhotoBtn.addEventListener("click", ()=>{
if(!editingTile) return;
editingTile.photo = null;
saveAll();
render();
showToast("Photo removed");
});
cancelBtn.addEventListener("click", closeEditor);
saveBtn.addEventListener("click", ()=>{
if(!editingTile) return;
const a = editLabel.value.trim();
const b = editSay.value.trim();
if(a) editingTile.label = a;
if(b) editingTile.say = b;
saveAll();
render();
showToast("Saved");
closeEditor();
});
editModal.addEventListener("click", (e)=>{
if(e.target === editModal) closeEditor();
});

filePick.addEventListener("change", async (e)=>{
const file = e.target.files && e.target.files[0];
if(!file || !editingTile){
filePick.value = "";
return;
}
const dataUrl = await fileToDataURL(file);
editingTile.photo = dataUrl;
filePick.value = "";
saveAll();
render();
showToast("Photo saved");
});
function fileToDataURL(file){
return new Promise((resolve,reject)=>{
const r = new FileReader();
r.onload = ()=>resolve(r.result);
r.onerror = reject;
r.readAsDataURL(file);
});
}

/* ===== Sizes ===== */
function getCSSNum(varName){
const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
return parseInt(v.replace("px",""), 10);
}
function setCSS(varName, px){
document.documentElement.style.setProperty(varName, px + "px");
}
function openSizes(){
// read current values
const tile = getCSSNum("--tileSize");
const icon = getCSSNum("--iconSize");
const fw = getCSSNum("--frameW"); // we'll use frame slider to set both W and H proportionally
tileSizeRange.value = tile;
iconSizeRange.value = icon;
frameSizeRange.value = fw;
updateSizeLabels();
sizeModal.classList.add("on");
}
function closeSizes(){
sizeModal.classList.remove("on");
}
function updateSizeLabels(){
tileSizeVal.textContent = tileSizeRange.value + "px";
iconSizeVal.textContent = iconSizeRange.value + "px";
frameSizeVal.textContent = frameSizeRange.value + "px";
}
function applySizesLive(){
const tile = parseInt(tileSizeRange.value,10);
const icon = parseInt(iconSizeRange.value,10);
const fw = parseInt(frameSizeRange.value,10);

setCSS("--tileSize", tile);
setCSS("--iconSize", icon);
setCSS("--frameW", fw);
setCSS("--frameH", Math.round(fw * 0.77)); // keeps nice rectangle

render();
}

tileSizeRange.addEventListener("input", ()=>{ updateSizeLabels(); applySizesLive(); });
iconSizeRange.addEventListener("input", ()=>{ updateSizeLabels(); applySizesLive(); });
frameSizeRange.addEventListener("input", ()=>{ updateSizeLabels(); applySizesLive(); });

sizeChip.addEventListener("click", openSizes);
sizeCancelBtn.addEventListener("click", closeSizes);

sizeSaveBtn.addEventListener("click", ()=>{
const ui = {
tileSize: parseInt(tileSizeRange.value,10),
iconSize: parseInt(iconSizeRange.value,10),
frameW: parseInt(frameSizeRange.value,10),
};
localStorage.setItem(UI_KEY, JSON.stringify(ui));
showToast("Sizes saved");
closeSizes();
});

sizeModal.addEventListener("click", (e)=>{
if(e.target === sizeModal) closeSizes();
});

function loadUISizes(){
try{
const raw = localStorage.getItem(UI_KEY);
if(!raw) return;
const ui = JSON.parse(raw);
if(ui && ui.tileSize) setCSS("--tileSize", ui.tileSize);
if(ui && ui.iconSize) setCSS("--iconSize", ui.iconSize);
if(ui && ui.frameW){
setCSS("--frameW", ui.frameW);
setCSS("--frameH", Math.round(ui.frameW * 0.77));
}
}catch(e){}
}

/* ===== Render ===== */
function render(){
if(currentPage === "pain"){
painWrap.classList.add("on");
renderPainBar();
}else{
painWrap.classList.remove("on");
painRow.innerHTML = "";
}

grid.innerHTML = "";
const tiles = tilesForPage(currentPage);

tiles.forEach(tile=>{
const el = document.createElement("div");
el.className = "tile";
if(tile._yn === "yes") el.classList.add("yesTile");
if(tile._yn === "no") el.classList.add("noTile");
el.setAttribute("role","button");
el.setAttribute("tabindex","0");

const mediaArea = document.createElement("div");
mediaArea.className = "mediaArea";

const frame = document.createElement("div");
frame.className = "frame";

const effectivePhoto = tile._fixed ? null : tile.photo;

if(effectivePhoto){
const img = document.createElement("img");
img.src = effectivePhoto;
img.alt = "";
frame.appendChild(img);
}else{
frame.innerHTML = iconSVG(tile.icon);
}

mediaArea.appendChild(frame);

const labelArea = document.createElement("div");
labelArea.className = "labelArea";

const label = document.createElement("div");
label.className = "label";
label.textContent = tile.label;

labelArea.appendChild(label);

el.appendChild(mediaArea);
el.appendChild(labelArea);

const activate = ()=>{
if(editMode){
if(tile._fixed){
showToast("Yes/No are fixed");
return;
}
openEditor(tile);
return;
}

if(confirmMode){
if(confirmPendingId === tile.id){
clearTimeout(confirmTimer);
confirmPendingId = null;
speak(tile.say);
showToast("Spoken");
}else{
confirmPendingId = tile.id;
showToast("Tap again to confirm");
clearTimeout(confirmTimer);
confirmTimer = setTimeout(()=>{ confirmPendingId = null; }, 2200);
}
return;
}

speak(tile.say);
};

el.addEventListener("click", activate);
el.addEventListener("keydown", (ev)=>{
if(ev.key==="Enter" || ev.key===" "){
ev.preventDefault();
activate();
}
});

grid.appendChild(el);
});
}

/* ===== Controls ===== */
confirmChip.addEventListener("click", ()=>{
confirmMode = !confirmMode;
setChipState(confirmChip, confirmMode);
saveAll();
});
soundChip.addEventListener("click", ()=>{
soundOn = !soundOn;
setChipState(soundChip, soundOn);
showToast(soundOn ? "Sound ON" : "Sound OFF");
saveAll();
});
editChip.addEventListener("click", ()=>{
editMode = !editMode;
setChipState(editChip, editMode);
showToast(editMode ? "Edit ON" : "Edit OFF");
if(!editMode) closeEditor();
saveAll();
});
resetBtn.addEventListener("click", ()=>{
if(!confirm("Reset everything to default?")) return;
state = deepCopy(DEFAULT);
confirmMode = false;
soundOn = true;
editMode = false;
setChipState(confirmChip,false);
setChipState(soundChip,true);
setChipState(editChip,false);
confirmPendingId = null;
closeEditor();
saveAll();
render();
showToast("Reset done");
});
clearBtn.addEventListener("click", ()=>{
if(!confirm("Clear ONLY custom photos?")) return;
["move","team","equipment","needs"].forEach(p=>{
(state[p]||[]).forEach(t=> t.photo = null);
});
closeEditor();
saveAll();
render();
showToast("Photos cleared");
});

/* ===== Pages ===== */
pageMove.addEventListener("click", ()=> setActivePage("move"));
pageTeam.addEventListener("click", ()=> setActivePage("team"));
pageEquipment.addEventListener("click", ()=> setActivePage("equipment"));
pageNeeds.addEventListener("click", ()=> setActivePage("needs"));
pagePain.addEventListener("click", ()=> setActivePage("pain"));

/* ===== Startup ===== */
loadFlags();
loadUISizes();

setChipState(confirmChip, confirmMode);
setChipState(soundChip, soundOn);
setChipState(editChip, editMode);

setActivePage(currentPage);
render();
</script>
</body>
</html>
