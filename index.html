<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MCU Talkboard</title>

  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a33;
      --text:#f3f6ff;
      --muted:rgba(243,246,255,.78);
      --border:rgba(255,255,255,.16);

      --chipFont:22px;
      --chipPadY:14px;
      --chipPadX:20px;
      --chipMinH:58px;

      --ctrlFont:16px;
      --ctrlPadY:10px;
      --ctrlPadX:14px;

      --tileW:250px;
      --tileH:250px;
      --frameW:178px;
      --frameH:150px;
      --gap:30px;
      --labelFont:26px;
      --labelMinH:82px;
      --labelPad:10px;

      --painFont:22px;
      --painMinH:62px;
    }

    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg,var(--panel),rgba(18,26,51,.94));
      border-bottom:1px solid rgba(255,255,255,.10);
      padding:14px 14px calc(12px + env(safe-area-inset-top));
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .title{
      margin-right:auto;
      font-weight:800;
      color:var(--muted);
      font-size:16px;
      letter-spacing:.2px;
    }

    .controls .chip{
      font-size:var(--ctrlFont);
      padding:var(--ctrlPadY) var(--ctrlPadX);
      min-height:44px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      color:var(--text);
      font-weight:800;
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
    }

    .controls .chip.on{
      border-color:rgba(118,167,255,.65);
      box-shadow:0 0 0 3px rgba(118,167,255,.20) inset;
      background:rgba(118,167,255,.10);
    }

    .controls .danger{
      background:rgba(255,77,79,.14);
      border-color:rgba(255,77,79,.35);
    }

    .pages{margin-top:12px}

    .pages .chip{
      font-size:var(--chipFont);
      padding:var(--chipPadY) var(--chipPadX);
      min-height:var(--chipMinH);
      border-radius:999px;
      border:none;
      font-weight:950;
      letter-spacing:.2px;
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
    }

    .pages .chip.active{
      box-shadow:0 0 0 5px rgba(255,255,255,.18) inset;
      transform:translateY(-1px);
    }

    #pageNeeds{ background:#ff4d4f; color:#fff; }
    #pageMove{ background:#2b7cff; color:#fff; }
    #pageCommunication{ background:#ffd43b; color:#2a2100; }
    #pageTeam{ background:#2fe6b3; color:#062218; }
    #pageFeelings{ background:#ff8ad6; color:#330022; }
    #pagePeople{ background:#4dd2ff; color:#002333; }
    #pageFavorites{ background:#8cff66; color:#133300; }
    #pagePain{ background:#b26bff; color:#fff; }

    main{
      padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,var(--tileW)));
      gap:var(--gap);
      justify-content:center;
      align-content:start;
    }

    .tile{
      width:var(--tileW);
      height:var(--tileH);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      touch-action:manipulation;
      border:2px solid rgba(255,255,255,.18);
      box-shadow:0 10px 26px rgba(0,0,0,.22);
    }

    .grid .tile:nth-child(1){
      background:linear-gradient(180deg,#2b7cff,#1f66db);
      border-radius:18px;
    }
    .grid .tile:nth-child(2){
      background:linear-gradient(180deg,#ffb347,#ff8c00);
      border-radius:34px 18px 34px 18px;
    }
    .grid .tile:nth-child(3){
      background:linear-gradient(180deg,#2fe6b3,#0aa574);
      border-radius:18px 34px 18px 34px;
    }
    .grid .tile:nth-child(4){
      background:linear-gradient(180deg,#b26bff,#8b3dff);
      border-radius:28px;
    }

    .mediaArea{
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 12px 10px;
    }

    .frame{
      width:var(--frameW);
      height:var(--frameH);
      border-radius:18px;
      border:2px solid rgba(255,255,255,.18);
      background:#fff;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 14px rgba(0,0,0,.12);
    }

    .grid .tile:nth-child(2) .frame{
      border-radius:28px;
    }
    .grid .tile:nth-child(3) .frame{
      border-radius:50%;
      width:150px;
      height:150px;
    }
    .grid .tile:nth-child(4) .frame{
      border-radius:12px;
      transform:rotate(-2deg);
    }

    .frame img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      background:#fff;
    }

    .labelArea{
      flex:0 0 auto;
      min-height:var(--labelMinH);
      padding:var(--labelPad);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .label{
      width:100%;
      text-align:center;
      font-weight:950;
      font-size:var(--labelFont);
      line-height:1.08;
      padding:12px 14px;
      border-radius:16px;
      background:#fff;
      color:#000;
      box-sizing:border-box;
      border:2px solid rgba(0,0,0,.14);
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ynRow{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:46px;
      flex-wrap:nowrap;
    }

    .ynBtn{
      width:128px;
      height:128px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:900;
      border:none;
      color:#fff;
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
      box-shadow:0 10px 22px rgba(0,0,0,.24);
    }

    .ynYes{background:#22b63f}
    .ynNo{background:#e53935}

    .painWrap{display:none;margin-bottom:14px}
    .painWrap.on{display:block}

    .painTop{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
      color:rgba(243,246,255,.85);
      font-weight:900;
      font-size:14px;
    }

    .painRow{
      display:flex;
      gap:8px;
      width:100%;
    }

    .painBtn{
      flex:1 1 0;
      min-height:var(--painMinH);
      border-radius:0;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-weight:950;
      font-size:var(--painFont);
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .painBtn.left{border-radius:14px 0 0 14px}
    .painBtn.right{border-radius:0 14px 14px 0}

    .painBtn.active{
      box-shadow:0 0 0 4px rgba(255,255,255,.14) inset;
      border-color:rgba(255,255,255,.28);
    }

    .painFaceBig{
      margin-top:16px;
      height:170px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:130px;
      line-height:1;
      user-select:none;
      -webkit-user-select:none;
    }

    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      background:rgba(0,0,0,.75);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:50;
    }

    .toast.on{opacity:1}
    #filePick{display:none}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:100;
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
    }

    .modal.on{display:flex}

    .sheet{
      width:min(720px,100%);
      background:rgba(18,26,51,.98);
      border:1px solid rgba(255,255,255,.16);
      border-radius:20px;
      padding:14px;
    }

    .sheet h3{
      margin:0 0 10px 0;
      font-size:16px;
      color:rgba(243,246,255,.85);
      letter-spacing:.2px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .field label{
      font-size:13px;
      color:rgba(243,246,255,.75);
      font-weight:800;
    }

    .field input,.field input[type="range"]{
      height:44px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:0 12px;
      font-size:16px;
      font-weight:700;
      outline:none;
      box-sizing:border-box;
      width:100%;
    }

    .rangeRow{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .rangeValue{
      min-width:54px;
      text-align:right;
      font-weight:900;
      color:rgba(243,246,255,.85);
    }

    .sheetActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-top:10px;
    }

    .btn{
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:var(--text);
      height:44px;
      padding:0 14px;
      font-weight:900;
      font-size:14px;
      touch-action:manipulation;
    }

    .btn.primary{
      border-color:rgba(118,167,255,.55);
      background:rgba(118,167,255,.14);
    }

    .btn.danger{
      border-color:rgba(255,77,79,.45);
      background:rgba(255,77,79,.14);
    }
  </style>
</head>

<body>
<header>
  <div class="row controls">
    <div class="title">MCU Talkboard</div>
    <button class="chip" id="confirmChip" type="button">Confirm</button>
    <button class="chip on" id="soundChip" type="button">Sound</button>
    <button class="chip" id="editChip" type="button">Edit</button>
    <button class="chip" id="sizeChip" type="button">Sizes</button>
    <button class="chip danger" id="resetBtn" type="button">Reset</button>
    <button class="chip danger" id="clearBtn" type="button">Clear Photos</button>
  </div>

  <div class="row pages" id="pageRow">
    <button class="chip active" id="pageNeeds" type="button">Needs</button>
    <button class="chip" id="pageMove" type="button">Move</button>
    <button class="chip" id="pageCommunication" type="button">Communication</button>
    <button class="chip" id="pageTeam" type="button">Team</button>
    <button class="chip" id="pageFeelings" type="button">Feelings</button>
    <button class="chip" id="pagePeople" type="button">People</button>
    <button class="chip" id="pageFavorites" type="button">Favorites</button>
    <button class="chip" id="pagePain" type="button">Pain</button>
  </div>

  <div class="hint">Low-demand layout. You can change button size, photo size, and distance between all buttons in Sizes.</div>
</header>

<main>
  <div class="painWrap" id="painWrap">
    <div class="painTop"><span>No pain</span><span>Worst pain</span></div>
    <div class="painRow" id="painRow"></div>
    <div class="painFaceBig" id="painFaceBig">😊</div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="ynRow" id="ynRow"></div>
</main>

<div class="toast" id="toast">Saved</div>
<input id="filePick" type="file" accept="image/*" />

<div class="modal" id="editModal">
  <div class="sheet">
    <h3>Edit button</h3>

    <div class="field">
      <label for="editLabel">Button name</label>
      <input id="editLabel" autocomplete="off" />
    </div>

    <div class="field">
      <label for="editSay">What it should say</label>
      <input id="editSay" autocomplete="off" />
    </div>

    <div class="sheetActions">
      <button class="btn" id="photoBtn" type="button">Choose photo</button>
      <button class="btn danger" id="removePhotoBtn" type="button">Remove photo</button>
      <button class="btn" id="cancelBtn" type="button">Cancel</button>
      <button class="btn primary" id="saveBtn" type="button">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="sizeModal">
  <div class="sheet">
    <h3>Sizes</h3>

    <div class="field">
      <label>Button size</label>
      <div class="rangeRow">
        <input id="tileSizeRange" type="range" min="220" max="290" step="2" />
        <div class="rangeValue" id="tileSizeVal"></div>
      </div>
    </div>

    <div class="field">
      <label>Photo frame size</label>
      <div class="rangeRow">
        <input id="frameSizeRange" type="range" min="150" max="200" step="2" />
        <div class="rangeValue" id="frameSizeVal"></div>
      </div>
    </div>

    <div class="field">
      <label>Distance between buttons</label>
      <div class="rangeRow">
        <input id="gapSizeRange" type="range" min="10" max="80" step="2" />
        <div class="rangeValue" id="gapSizeVal"></div>
      </div>
    </div>

    <div class="sheetActions">
      <button class="btn" id="sizeCancelBtn" type="button">Close</button>
      <button class="btn primary" id="sizeSaveBtn" type="button">Save</button>
    </div>
  </div>
</div>

<script>
  const IMAGE_FILES = {
    sit: "sit.png",
    stand: "stand.png",
    outofbed: "outofbed.png",
    inbed: "inbed.png",
    stop: "stop.png",
    nurse: "nurse.png",
    doctor: "doctor.png",
    ot: "ot.png",
    pt: "pt.png",
    speech: "speech.png",
    callbell: "callbell.png",
    wheelchair: "wheelchair.png",
    bed: "bed.png",
    reposition: "reposition.png",
    toilet: "toilet.png",
    chair: "chair.png",
    drink: "drink.png",
    food: "food.png",
    pain: "pain.png",
    help: "help.png",
    dontunderstand: "dontunderstand.png",
    repeat: "repeat.png",
    slowdown: "slowdown.png",
    happy: "happy.png",
    sad: "sad.png",
    frustrated: "frustrated.png",
    exhausted: "exhausted.png",
    anxious: "anxious.png",
    confused: "confused.png",
    family: "family.png",
    friend: "friend.png",
    partner: "partner.png",
    child: "child.png",
    mum: "mum.png",
    dad: "dad.png",
    lipstick: "lipstick.png",
    clothes: "clothes.png",
    phone: "phone.png",
    music: "music.png",
    glasses: "glasses.png",
    blanket: "blanket.png"
  };

  const DEFAULT = {
    needs: [
      { id:"help", label:"Help", say:"I need help now", photo:IMAGE_FILES.help },
      { id:"pain", label:"Pain", say:"I have pain", photo:IMAGE_FILES.pain },
      { id:"drink", label:"Drink", say:"I want a drink", photo:IMAGE_FILES.drink },
      { id:"toilet", label:"Toilet", say:"I need the toilet", photo:IMAGE_FILES.toilet }
    ],
    move: [
      { id:"sit", label:"Sit", say:"I want to sit up", photo:IMAGE_FILES.sit },
      { id:"inbed", label:"In Bed", say:"I want to stay in bed", photo:IMAGE_FILES.inbed },
      { id:"oob", label:"Out of Bed", say:"I want to get out of bed", photo:IMAGE_FILES.outofbed },
      { id:"stop", label:"Stop", say:"Stop please", photo:IMAGE_FILES.stop }
    ],
    communication: [
      { id:"dontunderstand", label:"I don't understand", say:"I don't understand", photo:IMAGE_FILES.dontunderstand },
      { id:"repeat", label:"Repeat please", say:"Please repeat", photo:IMAGE_FILES.repeat },
      { id:"slowdown", label:"Slow down", say:"Please slow down", photo:IMAGE_FILES.slowdown },
      { id:"help2", label:"Help", say:"I need help now", photo:IMAGE_FILES.help }
    ],
    team: [
      { id:"nurse", label:"Nurse", say:"I want the nurse", photo:IMAGE_FILES.nurse },
      { id:"doctor", label:"Doctor", say:"I want the doctor", photo:IMAGE_FILES.doctor },
      { id:"ot", label:"OT", say:"I want occupational therapy", photo:IMAGE_FILES.ot },
      { id:"speech", label:"Speech", say:"I want speech pathology", photo:IMAGE_FILES.speech }
    ],
    feelings: [
      { id:"sad", label:"Sad", say:"I feel sad", photo:IMAGE_FILES.sad },
      { id:"frustrated", label:"Frustrated", say:"I feel frustrated", photo:IMAGE_FILES.frustrated },
      { id:"anxious", label:"Anxious", say:"I feel anxious", photo:IMAGE_FILES.anxious },
      { id:"exhausted", label:"Exhausted", say:"I feel exhausted", photo:IMAGE_FILES.exhausted }
    ],
    people: [
      { id:"family", label:"Family", say:"I want my family", photo:IMAGE_FILES.family },
      { id:"friend", label:"Friend", say:"I want my friend", photo:IMAGE_FILES.friend },
      { id:"mum", label:"Mum", say:"I want my mum", photo:IMAGE_FILES.mum },
      { id:"dad", label:"Dad", say:"I want my dad", photo:IMAGE_FILES.dad }
    ],
    favorites: [
      { id:"phone", label:"Phone", say:"I want my phone", photo:IMAGE_FILES.phone },
      { id:"glasses", label:"Glasses", say:"I want my glasses", photo:IMAGE_FILES.glasses },
      { id:"blanket", label:"Blanket", say:"I want my blanket", photo:IMAGE_FILES.blanket },
      { id:"music", label:"Music", say:"I want music", photo:IMAGE_FILES.music }
    ]
  };

  const STORAGE_KEY = "mcuTalkboard_lowdemand_v2";
  const UI_KEY = "mcuTalkboard_lowdemand_ui_v2";
  const EDIT_PASSWORD = "1234";

  let state = loadState();
  let currentPage = "needs";
  let confirmMode = false;
  let soundOn = true;
  let editMode = false;
  let confirmPendingId = null;
  let confirmTimer = null;
  let editingTile = null;

  const grid = document.getElementById("grid");
  const ynRow = document.getElementById("ynRow");
  const toast = document.getElementById("toast");
  const filePick = document.getElementById("filePick");
  const painWrap = document.getElementById("painWrap");
  const painRow = document.getElementById("painRow");
  const painFaceBig = document.getElementById("painFaceBig");

  const confirmChip = document.getElementById("confirmChip");
  const soundChip = document.getElementById("soundChip");
  const editChip = document.getElementById("editChip");
  const sizeChip = document.getElementById("sizeChip");
  const resetBtn = document.getElementById("resetBtn");
  const clearBtn = document.getElementById("clearBtn");

  const pageNeeds = document.getElementById("pageNeeds");
  const pageMove = document.getElementById("pageMove");
  const pageCommunication = document.getElementById("pageCommunication");
  const pageTeam = document.getElementById("pageTeam");
  const pageFeelings = document.getElementById("pageFeelings");
  const pagePeople = document.getElementById("pagePeople");
  const pageFavorites = document.getElementById("pageFavorites");
  const pagePain = document.getElementById("pagePain");

  const editModal = document.getElementById("editModal");
  const editLabel = document.getElementById("editLabel");
  const editSay = document.getElementById("editSay");
  const photoBtn = document.getElementById("photoBtn");
  const removePhotoBtn = document.getElementById("removePhotoBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const saveBtn = document.getElementById("saveBtn");

  const sizeModal = document.getElementById("sizeModal");
  const tileSizeRange = document.getElementById("tileSizeRange");
  const frameSizeRange = document.getElementById("frameSizeRange");
  const gapSizeRange = document.getElementById("gapSizeRange");
  const tileSizeVal = document.getElementById("tileSizeVal");
  const frameSizeVal = document.getElementById("frameSizeVal");
  const gapSizeVal = document.getElementById("gapSizeVal");
  const sizeCancelBtn = document.getElementById("sizeCancelBtn");
  const sizeSaveBtn = document.getElementById("sizeSaveBtn");

  function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("on");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("on"),900);
  }

  function saveAll(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        state,currentPage,confirmMode,soundOn,editMode
      }));
    }catch(e){
      showToast("Save blocked");
    }
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && parsed.state && parsed.state.needs) return parsed.state;
      }
    }catch(e){}
    return deepCopy(DEFAULT);
  }

  function loadFlags(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(parsed){
        if(typeof parsed.currentPage === "string") currentPage = parsed.currentPage;
        if(typeof parsed.confirmMode === "boolean") confirmMode = parsed.confirmMode;
        if(typeof parsed.soundOn === "boolean") soundOn = parsed.soundOn;
        if(typeof parsed.editMode === "boolean") editMode = parsed.editMode;
      }
    }catch(e){}
  }

  function speak(text){
    if(!soundOn) return;
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92;
      u.pitch = 1.0;
      u.volume = 1.0;
      window.speechSynthesis.speak(u);
    }catch(e){
      showToast("Speech blocked");
    }
  }

  function setChipState(btn,on){
    btn.classList.toggle("on",!!on);
  }

  function setActivePage(page){
    currentPage = page;
    [pageNeeds,pageMove,pageCommunication,pageTeam,pageFeelings,pagePeople,pageFavorites,pagePain].forEach(b=>b.classList.remove("active"));
    if(page==="needs") pageNeeds.classList.add("active");
    if(page==="move") pageMove.classList.add("active");
    if(page==="communication") pageCommunication.classList.add("active");
    if(page==="team") pageTeam.classList.add("active");
    if(page==="feelings") pageFeelings.classList.add("active");
    if(page==="people") pagePeople.classList.add("active");
    if(page==="favorites") pageFavorites.classList.add("active");
    if(page==="pain") pagePain.classList.add("active");
    render();
    saveAll();
  }

  function tilesForPage(page){
    if(page==="pain") return [];
    return [...(state[page] || [])].slice(0,4);
  }

  function painColor(n){
    if(n<=2) return "rgba(47,230,179,.18)";
    if(n<=5) return "rgba(255,212,59,.18)";
    if(n<=7) return "rgba(255,140,0,.18)";
    return "rgba(255,77,79,.18)";
  }

  function renderPainBar(){
    const EMO = ["😊","🤨","🥺","😑","😕","☹️","😓","😣","😖","😫","😭"];
    painRow.innerHTML = "";
    painFaceBig.textContent = EMO[0];

    for(let n=0;n<=10;n++){
      const b = document.createElement("button");
      b.className = "painBtn";
      b.type = "button";
      b.style.background = painColor(n);
      if(n===0) b.classList.add("left");
      if(n===10) b.classList.add("right");

      const t = document.createElement("span");
      t.textContent = String(n);
      b.appendChild(t);

      b.addEventListener("click", ()=>{
        speak(`My pain is ${n}`);
        [...painRow.children].forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        painFaceBig.textContent = EMO[n];
      });

      painRow.appendChild(b);
    }
  }

  function openEditor(tile){
    editingTile = tile;
    editLabel.value = tile.label || "";
    editSay.value = tile.say || "";
    editModal.classList.add("on");
    setTimeout(()=>editLabel.focus(),80);
  }

  function closeEditor(){
    editModal.classList.remove("on");
    editingTile = null;
  }

  photoBtn.addEventListener("click", ()=>{
    if(!editingTile) return;
    filePick.value = "";
    filePick.click();
  });

  removePhotoBtn.addEventListener("click", ()=>{
    if(!editingTile) return;
    editingTile.photo = null;
    saveAll();
    render();
    showToast("Photo removed");
  });

  cancelBtn.addEventListener("click", closeEditor);

  saveBtn.addEventListener("click", ()=>{
    if(!editingTile) return;
    const a = editLabel.value.trim();
    const b = editSay.value.trim();
    if(a) editingTile.label = a;
    if(b) editingTile.say = b;
    saveAll();
    render();
    showToast("Saved");
    closeEditor();
  });

  editModal.addEventListener("click", e=>{
    if(e.target===editModal) closeEditor();
  });

  filePick.addEventListener("change", async e=>{
    const file = e.target.files && e.target.files[0];
    if(!file || !editingTile){
      filePick.value = "";
      return;
    }
    const dataUrl = await fileToDataURL(file);
    editingTile.photo = dataUrl;
    filePick.value = "";
    saveAll();
    render();
    showToast("Photo saved");
  });

  function fileToDataURL(file){
    return new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function getCSSNum(varName){
    const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    return parseInt(v.replace("px",""),10);
  }

  function setCSS(varName, px){
    document.documentElement.style.setProperty(varName, px + "px");
  }

  function openSizes(){
    tileSizeRange.value = getCSSNum("--tileW");
    frameSizeRange.value = getCSSNum("--frameW");
    gapSizeRange.value = getCSSNum("--gap");
    updateSizeLabels();
    sizeModal.classList.add("on");
  }

  function closeSizes(){
    sizeModal.classList.remove("on");
  }

  function updateSizeLabels(){
    tileSizeVal.textContent = tileSizeRange.value + "px";
    frameSizeVal.textContent = frameSizeRange.value + "px";
    gapSizeVal.textContent = gapSizeRange.value + "px";
  }

  function applySizesLive(){
    const tile = parseInt(tileSizeRange.value,10);
    const fw = parseInt(frameSizeRange.value,10);
    const gap = parseInt(gapSizeRange.value,10);

    setCSS("--tileW", tile);
    setCSS("--tileH", tile);
    setCSS("--frameW", fw);
    setCSS("--frameH", Math.round(fw * 0.84));
    setCSS("--gap", gap);
    render();
  }

  tileSizeRange.addEventListener("input", ()=>{
    updateSizeLabels();
    applySizesLive();
  });

  frameSizeRange.addEventListener("input", ()=>{
    updateSizeLabels();
    applySizesLive();
  });

  gapSizeRange.addEventListener("input", ()=>{
    updateSizeLabels();
    applySizesLive();
  });

  sizeChip.addEventListener("click", openSizes);
  sizeCancelBtn.addEventListener("click", closeSizes);

  sizeSaveBtn.addEventListener("click", ()=>{
    const ui = {
      tileW: parseInt(tileSizeRange.value,10),
      frameW: parseInt(frameSizeRange.value,10),
      gap: parseInt(gapSizeRange.value,10)
    };
    localStorage.setItem(UI_KEY, JSON.stringify(ui));
    showToast("Sizes saved");
    closeSizes();
  });

  sizeModal.addEventListener("click", e=>{
    if(e.target===sizeModal) closeSizes();
  });

  function loadUISizes(){
    try{
      const raw = localStorage.getItem(UI_KEY);
      if(!raw) return;
      const ui = JSON.parse(raw);
      if(ui && ui.tileW){
        setCSS("--tileW", ui.tileW);
        setCSS("--tileH", ui.tileW);
      }
      if(ui && ui.frameW){
        setCSS("--frameW", ui.frameW);
        setCSS("--frameH", Math.round(ui.frameW * 0.84));
      }
      if(ui && ui.gap){
        setCSS("--gap", ui.gap);
      }
    }catch(e){}
  }

  function buildTile(tile){
    const el = document.createElement("div");
    el.className = "tile";
    el.setAttribute("role","button");
    el.setAttribute("tabindex","0");

    const mediaArea = document.createElement("div");
    mediaArea.className = "mediaArea";

    const frame = document.createElement("div");
    frame.className = "frame";

    if(tile.photo){
      const img = document.createElement("img");
      img.src = tile.photo;
      img.alt = "";
      frame.appendChild(img);
    }

    mediaArea.appendChild(frame);

    const labelArea = document.createElement("div");
    labelArea.className = "labelArea";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = tile.label;

    labelArea.appendChild(label);
    el.appendChild(mediaArea);
    el.appendChild(labelArea);

    const activate = ()=>{
      if(editMode){
        openEditor(tile);
        return;
      }

      if(confirmMode){
        if(confirmPendingId === tile.id){
          clearTimeout(confirmTimer);
          confirmPendingId = null;
          speak(tile.say);
          showToast("Spoken");
        }else{
          confirmPendingId = tile.id;
          showToast("Tap again to confirm");
          clearTimeout(confirmTimer);
          confirmTimer = setTimeout(()=>{ confirmPendingId = null; },2200);
        }
        return;
      }

      speak(tile.say);
    };

    el.addEventListener("click", activate);
    el.addEventListener("keydown", ev=>{
      if(ev.key==="Enter" || ev.key===" "){
        ev.preventDefault();
        activate();
      }
    });

    return el;
  }

  function handleConfirmSpeak(id, text){
    if(confirmPendingId === id){
      clearTimeout(confirmTimer);
      confirmPendingId = null;
      speak(text);
      showToast("Spoken");
    }else{
      confirmPendingId = id;
      showToast("Tap again to confirm");
      clearTimeout(confirmTimer);
      confirmTimer = setTimeout(()=>{ confirmPendingId = null; },2200);
    }
  }

  function render(){
    if(currentPage==="pain"){
      painWrap.classList.add("on");
      renderPainBar();
    }else{
      painWrap.classList.remove("on");
      painRow.innerHTML = "";
      painFaceBig.textContent = "😊";
    }

    grid.innerHTML = "";
    ynRow.innerHTML = "";

    const tiles = tilesForPage(currentPage);
    tiles.forEach(tile=> grid.appendChild(buildTile(tile)));

    const yes = document.createElement("button");
    yes.className = "ynBtn ynYes";
    yes.textContent = "Yes";
    yes.addEventListener("click", ()=>{
      if(confirmMode) handleConfirmSpeak("yes_fixed","Yes");
      else speak("Yes");
    });

    const no = document.createElement("button");
    no.className = "ynBtn ynNo";
    no.textContent = "No";
    no.addEventListener("click", ()=>{
      if(confirmMode) handleConfirmSpeak("no_fixed","No");
      else speak("No");
    });

    ynRow.appendChild(yes);
    ynRow.appendChild(no);
  }

  confirmChip.addEventListener("click", ()=>{
    confirmMode = !confirmMode;
    setChipState(confirmChip, confirmMode);
    saveAll();
  });

  soundChip.addEventListener("click", ()=>{
    soundOn = !soundOn;
    setChipState(soundChip, soundOn);
    showToast(soundOn ? "Sound ON" : "Sound OFF");
    saveAll();
  });

  editChip.addEventListener("click", ()=>{
    if(!editMode){
      const entered = prompt("Enter password to enable Edit mode:");
      if(entered===null) return;
      if(entered!==EDIT_PASSWORD){
        showToast("Wrong password");
        return;
      }
      editMode = true;
      setChipState(editChip,true);
      showToast("Edit ON");
      saveAll();
    }else{
      editMode = false;
      setChipState(editChip,false);
      closeEditor();
      showToast("Edit OFF");
      saveAll();
    }
  });

  resetBtn.addEventListener("click", ()=>{
    if(!confirm("Reset everything to default?")) return;
    state = deepCopy(DEFAULT);
    confirmMode = false;
    soundOn = true;
    editMode = false;
    setChipState(confirmChip,false);
    setChipState(soundChip,true);
    setChipState(editChip,false);
    confirmPendingId = null;
    closeEditor();
    saveAll();
    render();
    showToast("Reset done");
  });

  clearBtn.addEventListener("click", ()=>{
    if(!confirm("Clear ONLY custom photos?")) return;
    ["needs","move","communication","team","feelings","people","favorites"].forEach(p=>{
      (state[p] || []).forEach(t=>{
        const original = DEFAULT[p].find(d=>d.id===t.id);
        t.photo = original ? original.photo : null;
      });
    });
    closeEditor();
    saveAll();
    render();
    showToast("Photos reset");
  });

  pageNeeds.addEventListener("click", ()=> setActivePage("needs"));
  pageMove.addEventListener("click", ()=> setActivePage("move"));
  pageCommunication.addEventListener("click", ()=> setActivePage("communication"));
  pageTeam.addEventListener("click", ()=> setActivePage("team"));
  pageFeelings.addEventListener("click", ()=> setActivePage("feelings"));
  pagePeople.addEventListener("click", ()=> setActivePage("people"));
  pageFavorites.addEventListener("click", ()=> setActivePage("favorites"));
  pagePain.addEventListener("click", ()=> setActivePage("pain"));

  loadFlags();
  loadUISizes();
  setChipState(confirmChip, confirmMode);
  setChipState(soundChip, soundOn);
  setChipState(editChip, editMode);
  setActivePage(currentPage);
  render();
</script>
</body>
</html>
