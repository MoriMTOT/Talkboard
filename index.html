<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>MCU Rehab Suite</title>
<style>
:root{--bg:#07111f;--panel:#101c31;--text:#f8fbff;--muted:#c8d4e6;--cardW:174px;--cardH:190px;--gap:18px;--shadow:0 12px 28px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#1d4ed8 0,transparent 25%),linear-gradient(180deg,#17243a,var(--bg));color:var(--text);-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}button{font-family:inherit;touch-action:manipulation}.app{max-width:1280px;margin:auto;padding:12px}.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}.title{font-size:25px;font-weight:950;margin-right:auto}.stat{background:rgba(255,255,255,.1);padding:9px 13px;border-radius:999px;font-weight:900}
.sentence{position:sticky;top:0;z-index:5;background:rgba(16,28,49,.96);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:10px;margin-bottom:10px;box-shadow:var(--shadow)}.sentenceText{min-height:54px;background:white;color:#111827;border-radius:16px;padding:12px;font-size:28px;font-weight:950;display:flex;align-items:center;flex-wrap:wrap;gap:8px}.sentenceText .empty{color:#64748b;font-size:22px}.sentenceBtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}.tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}.tab{border:0;border-radius:16px;padding:13px 6px;color:white;font-weight:950;font-size:14px;box-shadow:var(--shadow)}.tab.active{outline:4px solid rgba(255,255,255,.25)}.aac{background:#06b6d4}.match{background:#3b82f6}.orient{background:#f59e0b}.process{background:#10b981}.build{background:#ec4899}.results{background:#8b5cf6}.edit{background:#64748b}.panel{background:rgba(16,28,49,.9);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:14px}.stage{display:none}.stage.active{display:block}.prompt{text-align:center;font-size:30px;font-weight:950;margin-bottom:6px}.helper{text-align:center;color:var(--muted);margin-bottom:12px}.catbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}.cat{border:0;border-radius:999px;padding:11px 14px;background:rgba(255,255,255,.12);color:white;font-weight:900}.cat.active{background:white;color:#111827}.preview{display:flex;justify-content:center;margin-bottom:14px;min-height:150px}.previewCard{width:220px;height:150px;background:white;color:#111827;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:950;overflow:hidden;padding:10px;box-shadow:var(--shadow)}.previewCard img{width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none}.board{display:grid;gap:var(--gap);justify-content:center}.board.cols2{grid-template-columns:repeat(2,var(--cardW))}.board.cols3{grid-template-columns:repeat(3,var(--cardW))}.board.cols4{grid-template-columns:repeat(4,var(--cardW))}.board.cols5{grid-template-columns:repeat(5,var(--cardW))}.board.cols6{grid-template-columns:repeat(6,var(--cardW))}.card{width:var(--cardW);min-height:var(--cardH);border:0;border-radius:24px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}.card:nth-child(4n+1){background:linear-gradient(180deg,#60a5fa,#2563eb)}.card:nth-child(4n+2){background:linear-gradient(180deg,#fbbf24,#f97316)}.card:nth-child(4n+3){background:linear-gradient(180deg,#34d399,#059669)}.card:nth-child(4n+4){background:linear-gradient(180deg,#f9a8d4,#db2777)}.imgBox{width:100%;height:112px;background:white;border-radius:18px;display:flex;align-items:center;justify-content:center;overflow:hidden}.imgBox img{width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none}.wordOnly{width:100%;height:112px;background:white;color:#111827;border-radius:18px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:30px;font-weight:950;line-height:1.05;padding:8px}.label{margin-top:10px;background:white;color:#111827;border-radius:16px;padding:8px;font-weight:950;font-size:19px;text-align:center;min-height:50px;display:flex;align-items:center;justify-content:center;line-height:1.05}.feedback{text-align:center;font-size:30px;font-weight:950;min-height:38px;margin-top:14px}.good{color:#22c55e}.bad{color:#ef4444}.controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:999px;padding:13px 16px;background:rgba(255,255,255,.12);color:white;font-weight:950}.btn.on{outline:3px solid rgba(255,255,255,.25)}select,input{height:44px;border:0;border-radius:12px;padding:0 10px;background:rgba(255,255,255,.12);color:white;font:inherit}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.box{background:rgba(255,255,255,.08);border-radius:18px;padding:14px}.slots,.letters{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:12px 0}.slot,.letter{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:950}.slot{border:2px dashed rgba(255,255,255,.35)}.letter{background:white;color:#111827;border:0}.note{width:100%;min-height:160px;border:0;border-radius:16px;background:rgba(255,255,255,.1);color:white;padding:12px;font:inherit}
@media(max-width:1120px){.board.cols6{grid-template-columns:repeat(4,var(--cardW))}.board.cols5{grid-template-columns:repeat(4,var(--cardW))}.tabs{grid-template-columns:repeat(4,1fr)}}@media(max-width:850px){.tabs{grid-template-columns:repeat(2,1fr)}.board.cols3,.board.cols4,.board.cols5,.board.cols6{grid-template-columns:repeat(2,var(--cardW))}.grid2{grid-template-columns:1fr}.prompt{font-size:25px}}
</style>
</head><body><div class="app"><div class="top"><div class="title">MCU Rehab Suite</div><div class="stat">Mode: <span id="modeName">AAC</span></div><div class="stat">Rounds: <span id="rounds">0</span></div><div class="stat">Correct: <span id="correct">0</span></div></div><div class="sentence"><div class="sentenceText" id="sentenceText"><span class="empty">Tap words to build a sentence</span></div><div class="sentenceBtns"><button class="btn" id="speakSentence">Speak sentence</button><button class="btn" id="backspaceSentence">Backspace</button><button class="btn" id="clearSentence">Clear</button></div></div><div class="tabs"><button class="tab aac active" id="tabAAC">AAC</button><button class="tab match" id="tabMatch">Matching</button><button class="tab orient" id="tabOrient">Orientation</button><button class="tab process" id="tabProcess">Processing</button><button class="tab build" id="tabBuild">Word Build</button><button class="tab results" id="tabResults">Results</button><button class="tab edit" id="tabEdit">Edit</button></div><div class="panel"><section id="stageAAC" class="stage active"><div class="prompt">AAC Sentence Builder</div><div class="helper">Tap words. The sentence bar stays at the top.</div><div class="catbar" id="catbar"></div><div class="board cols6" id="aacBoard"></div></section><section id="stageTask" class="stage"><div class="prompt" id="prompt">Tap the same picture</div><div class="helper" id="helper">Options change by task relevance.</div><div class="preview" id="preview"></div><div class="board" id="board"></div></section><section id="stageBuild" class="stage"><div class="prompt" id="buildPrompt">Build the word</div><div class="helper">Tap letters in order.</div><div class="preview" id="buildPreview"></div><div class="slots" id="slots"></div><div class="letters" id="letters"></div></section><section id="stageResults" class="stage"><div class="prompt">Results</div><div class="grid2"><div class="box"><b>Matching</b><div id="rMatch"></div></div><div class="box"><b>Orientation</b><div id="rOrient"></div></div><div class="box"><b>Processing</b><div id="rProcess"></div></div><div class="box"><b>Word Build</b><div id="rBuild"></div></div></div><textarea class="note" id="summary" readonly></textarea></section><section id="stageEdit" class="stage"><div class="prompt">Edit</div><div class="grid2"><div class="box"><div class="field"><label>Item</label><select id="editItem"></select></div><div class="field"><label>Label</label><input id="editLabel"></div><div class="field"><label>Photo</label><input id="editPhoto" type="file" accept="image/*"></div><button class="btn" id="saveItem">Save item</button></div><div class="box"><div class="field"><label>Options per task</label><select id="optionCount"><option value="auto">Auto by task</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="6">6</option></select></div><button class="btn" id="clearSaved">Reset edited content</button></div></div></section><div class="feedback" id="feedback"></div><div class="controls"><button class="btn" id="speak">Speak target</button><button class="btn" id="next">Next</button><button class="btn" id="resetScore">Reset score</button></div></div></div>
<script>
const STORE='mcu_rehab_suite_real_fixed_v1';
const IMAGE_KEYS=new Set(['again','anxious','back','bathroom','bed','big','blanket','bottom','break','button','callbell','chair','child','choose','close','clothes','cold','come','confused','correct','cupdown','cupup','dad','different','doctor','dontunderstand','down','dress','drink','eat','exhausted','family','find','food','friend','front','frustrated','glasses','go','happy','help','hot','hungry','i','icon-192','icon-512','inbed','left','lipstick','look','more','mum','music','neck','need','no','not','nurse','open','ot','outofbed','pain','pants','partner','phone','pt','puton','read','repeat','reposition','right','sad','same','shirt','shoes','sit','sleeve','slowdown','small','sockleft','sockright','socks','speech','stand','stop','takeoff','thirsty','tired','toilet','top','turnoff','turnon','up','use','wait','want','wash','wheelchair','write','wrong','yes','you','zip']);
const IMG='images/';
const BASE_LABELS={again:'Again',anxious:'Anxious',back:'Back',bathroom:'Bathroom',bed:'Bed',big:'Big',blanket:'Blanket',bottom:'Bottom',break:'Break',button:'Button',callbell:'Call Bell',chair:'Chair',child:'Child',choose:'Choose',close:'Close',clothes:'Clothes',cold:'Cold',come:'Come',confused:'Confused',correct:'Correct',cupdown:'Cup down',cupup:'Cup up',dad:'Dad',different:'Different',doctor:'Doctor',dontunderstand:"Don't understand",down:'Down',dress:'Dress',drink:'Drink',eat:'Eat',exhausted:'Exhausted',family:'Family',find:'Find',food:'Food',friend:'Friend',front:'Front',frustrated:'Frustrated',glasses:'Glasses',go:'Go',happy:'Happy',help:'Help',hot:'Hot',hungry:'Hungry',i:'I',inbed:'In bed',left:'Left',lipstick:'Lipstick',look:'Look',more:'More',mum:'Mum',music:'Music',neck:'Neck',need:'Need',no:'No',not:'Not',nurse:'Nurse',open:'Open',ot:'OT',outofbed:'Out of bed',pain:'Pain',pants:'Pants',partner:'Partner',phone:'Phone',pt:'PT',puton:'Put on',read:'Read',repeat:'Repeat',reposition:'Reposition',right:'Right',sad:'Sad',same:'Same',shirt:'Shirt',shoes:'Shoes',sit:'Sit',sleeve:'Sleeve',slowdown:'Slow down',small:'Small',sockleft:'Sock left',sockright:'Sock right',socks:'Socks',speech:'Speech',stand:'Stand',stop:'Stop',takeoff:'Take off',thirsty:'Thirsty',tired:'Tired',toilet:'Toilet',top:'Top',turnoff:'Turn off',turnon:'Turn on',up:'Up',use:'Use',wait:'Wait',want:'Want',wash:'Wash',wheelchair:'Wheelchair',write:'Write',wrong:'Wrong',yes:'Yes',you:'You',zip:'Zip'};
let data=loadData(),mode='aac',current=null,built=[],sentence=[],optionSetting='auto';let stats={match:[0,0],orient:[0,0],process:[0,0],build:[0,0]};const $=id=>document.getElementById(id);
function loadData(){try{let x=localStorage.getItem(STORE); if(x)return JSON.parse(x)}catch(e){};let items={};Object.entries(BASE_LABELS).forEach(([k,v])=>items[k]={label:v,img:IMG+k+'.png'});return{items}}
function saveData(){localStorage.setItem(STORE,JSON.stringify(data))}function hasImg(k){return IMAGE_KEYS.has(k)}function lab(k){return data.items[k]?.label||BASE_LABELS[k]||k}function img(k){return data.items[k]?.img||IMG+k+'.png'}
function imageBox(k){if(hasImg(k)||String(img(k)).startsWith('data:'))return `<div class="imgBox"><img src="${img(k)}" alt="" onerror="this.closest('.imgBox').innerHTML='<div class=wordOnly>${lab(k)}</div>'"></div>`;return `<div class="wordOnly">${lab(k)}</div>`}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.rate=.9;speechSynthesis.speak(u)}catch(e){}}
function setStage(id){document.querySelectorAll('.stage').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');$('feedback').textContent='';$('feedback').className='feedback'}function tab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));$(id).classList.add('active')}function update(){let r=0,c=0;Object.values(stats).forEach(v=>{c+=v[0];r+=v[1]});$('rounds').textContent=r;$('correct').textContent=c}function feedback(t,ok){$('feedback').textContent=t;$('feedback').className='feedback '+(ok?'good':'bad')}function mark(kind,ok){stats[kind][1]++;if(ok)stats[kind][0]++;update()}
function addWord(k){sentence.push(lab(k));renderSentence();speak(lab(k))}function renderSentence(){$('sentenceText').innerHTML=sentence.length?sentence.map(w=>`<span>${w}</span>`).join(' '):'<span class="empty">Tap words to build a sentence</span>'}$('speakSentence').onclick=()=>{if(sentence.length)speak(sentence.join(' '))};$('backspaceSentence').onclick=()=>{sentence.pop();renderSentence()};$('clearSentence').onclick=()=>{sentence=[];renderSentence()};
function preview(k){$('preview').innerHTML=`<div class="previewCard">${hasImg(k)?`<img src="${img(k)}" alt="">`:lab(k)}</div>`}function card(k,kind){let b=document.createElement('button');b.className='card';b.innerHTML=imageBox(k)+`<div class="label">${lab(k)}</div>`;b.onclick=()=>{let ok=k===current.answer;mark(kind,ok);feedback(ok?'Correct':'Try again',ok)};return b}function aacCard(k){let b=document.createElement('button');b.className='card';b.innerHTML=imageBox(k)+`<div class="label">${lab(k)}</div>`;b.onclick=()=>addWord(k);return b}function cols(n){return n<=2?'cols2':n===3?'cols3':n===4?'cols4':n===5?'cols5':'cols6'}function nopts(task){if(optionSetting!=='auto')return +optionSetting;return task.options.length}
const CATS={Core:['i','you','want','need','help','not','more','stop','go','come','look','find','choose','use','read','write','eat','drink','wait','again'],Needs:['help','toilet','bathroom','thirsty','hungry','break','reposition','pain','turnon','turnoff','puton','takeoff'],Repairs:['repeat','slowdown','dontunderstand','help','wait','again','wrong','correct'],People:['mum','dad','family','friend','partner','child','doctor','nurse','ot','pt','speech'],Feelings:['happy','sad','frustrated','anxious','confused','exhausted','tired','hot','cold'],Actions:['go','come','look','find','choose','use','read','write','eat','drink','open','close','wash','dress'],Positions:['top','bottom','left','right','up','down','front','back','same','different'],Medical:['doctor','nurse','pain','bed','chair','wheelchair','callbell','help'],Food:['drink','food','toilet','hungry','thirsty'],Clothes:['clothes','shirt','pants','socks','shoes','button','zip','sleeve','neck','top','bottom'],Favorites:['phone','glasses','blanket','music','lipstick']};
function showAAC(){mode='aac';$('modeName').textContent='AAC';tab('tabAAC');setStage('stageAAC');$('catbar').innerHTML='';Object.keys(CATS).forEach((c,i)=>{let b=document.createElement('button');b.className='cat'+(i===0?' active':'');b.textContent=c;b.onclick=()=>drawCat(c,b);$('catbar').appendChild(b)});drawCat('Core')}function drawCat(c,btn){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active');$('aacBoard').innerHTML='';$('aacBoard').className='board cols6';CATS[c].forEach(k=>$('aacBoard').appendChild(aacCard(k)))}
const MATCH=[['drink','toilet','food','help'],['nurse','doctor','help','pain'],['bed','chair','wheelchair','blanket'],['phone','glasses','music','callbell'],['repeat','slowdown','dontunderstand','help'],['happy','sad','frustrated','anxious'],['shirt','pants','socks','shoes'],['button','zip','wash','dress'],['hot','cold','big','small'],['open','close','turnon','turnoff'],['top','bottom','left','right'],['up','down','front','back'],['bathroom','break','reposition','pain'],['sit','stand','stop','go'],['eat','drink','read','write'],['yes','no','correct','wrong'],['same','different','more','again'],['puton','takeoff','button','zip'],['doctor','nurse','chair','bed'],['callbell','help','phone','blanket']].map(a=>({answer:a[0],options:a}));
const ORIENT=[['top','bottom','sleeve','neck'],['bottom','top','sleeve','neck'],['sleeve','neck','top','bottom'],['neck','sleeve','top','bottom'],['up','down','left','right'],['down','up','left','right'],['left','right','up','down'],['right','left','up','down'],['front','back','left','right'],['back','front','left','right'],['cupup','cupdown','up','down'],['cupdown','cupup','up','down'],['sockleft','sockright','left','right'],['sockright','sockleft','left','right'],['top','bottom'],['sleeve','neck'],['left','right'],['up','down'],['front','back'],['button','zip','sleeve','neck']].map(a=>({answer:a[0],options:a}));const PROCESS=[...MATCH.slice(0,10).map(x=>({...x,prompt:'Find '+lab(x.answer)})),...ORIENT.slice(0,10).map(x=>({...x,prompt:'Tap '+lab(x.answer)}))];const BUILD=['sit','stop','help','food','drink','nurse','doctor','phone','music','glasses','blanket','repeat','slow','toilet','neck','sleeve','top','bottom','left','right'];
function startTask(kind){mode=kind;$('modeName').textContent=kind[0].toUpperCase()+kind.slice(1);tab('tab'+kind[0].toUpperCase()+kind.slice(1));setStage('stageTask');let pool=kind==='match'?MATCH:kind==='orient'?ORIENT:PROCESS;current=pool[Math.floor(Math.random()*pool.length)];$('prompt').textContent=current.prompt||(kind==='match'?'Tap the same picture':'Tap '+lab(current.answer));$('helper').textContent='Options on this screen: '+Math.min(nopts(current),current.options.length);preview(current.answer);let opts=shuffle(current.options).slice(0,nopts(current));if(!opts.includes(current.answer))opts[Math.floor(Math.random()*opts.length)]=current.answer;opts=shuffle(opts);$('board').className='board '+cols(opts.length);$('board').innerHTML='';opts.forEach(k=>$('board').appendChild(card(k,kind)))}
function startBuild(){mode='build';$('modeName').textContent='Word Build';tab('tabBuild');setStage('stageBuild');current={answer:BUILD[Math.floor(Math.random()*BUILD.length)]};built=[];$('buildPrompt').textContent='Build '+current.answer.toUpperCase();$('buildPreview').innerHTML=`<div class="previewCard">${current.answer.toUpperCase()}</div>`;$('slots').innerHTML='';$('letters').innerHTML='';let word=current.answer.toUpperCase();for(let i=0;i<word.length;i++)$('slots').innerHTML+='<div class="slot"></div>';let letters=word.split(''),abc='ABCDEFGHIJKLMNOPQRSTUVWXYZ';while(letters.length<Math.max(6,word.length+2))letters.push(abc[Math.floor(Math.random()*abc.length)]);shuffle(letters).forEach(ch=>{let b=document.createElement('button');b.className='letter';b.textContent=ch;b.onclick=()=>{if(built.length>=word.length)return;built.push(ch);[...document.querySelectorAll('.slot')].forEach((s,i)=>s.textContent=built[i]||'');b.disabled=true;b.style.opacity=.45;if(built.length===word.length){let ok=built.join('')===word;mark('build',ok);feedback(ok?'Correct':'Not quite',ok)}};$('letters').appendChild(b)})}
function showResults(){mode='results';$('modeName').textContent='Results';tab('tabResults');setStage('stageResults');$('rMatch').textContent=`${stats.match[0]} / ${stats.match[1]} correct`;$('rOrient').textContent=`${stats.orient[0]} / ${stats.orient[1]} correct`;$('rProcess').textContent=`${stats.process[0]} / ${stats.process[1]} correct`;$('rBuild').textContent=`${stats.build[0]} / ${stats.build[1]} correct`;let s='Clinical summary:\n';if(stats.orient[1]&&stats.orient[0]/stats.orient[1]<.5)s+='- Orientation errors suggest perceptual/praxis difficulty with clothing parts or object direction.\n';if(stats.process[1]&&stats.process[0]/stats.process[1]<.5)s+='- Processing task reduced; consider fatigue, attention, delirium/encephalopathy or scanning load.\n';if(stats.build[1]&&stats.build[0]/stats.build[1]<.5)s+='- Word building reduced; use recognition/picture supports rather than spelling demands.\n';s+='\nStrategy: reduce choices when accuracy drops; use picture first, word second; highlight neck/sleeves on real clothing; repeat same layout.';$('summary').value=s}
function showEdit(){mode='edit';$('modeName').textContent='Edit';tab('tabEdit');setStage('stageEdit');$('editItem').innerHTML='';Object.keys(data.items).forEach(k=>{$('editItem').innerHTML+=`<option value="${k}">${k}</option>`});loadEdit()}function loadEdit(){let k=$('editItem').value;$('editLabel').value=lab(k);$('editPhoto').value=''}
$('editItem').onchange=loadEdit;$('saveItem').onclick=()=>{let k=$('editItem').value;data.items[k].label=$('editLabel').value||data.items[k].label;let f=$('editPhoto').files[0];if(f){let r=new FileReader();r.onload=()=>{data.items[k].img=r.result;saveData();feedback('Saved',true)};r.readAsDataURL(f)}else{saveData();feedback('Saved',true)}};$('clearSaved').onclick=()=>{localStorage.removeItem(STORE);location.reload()};$('optionCount').onchange=e=>optionSetting=e.target.value;
$('tabAAC').onclick=showAAC;$('tabMatch').onclick=()=>startTask('match');$('tabOrient').onclick=()=>startTask('orient');$('tabProcess').onclick=()=>startTask('process');$('tabBuild').onclick=startBuild;$('tabResults').onclick=showResults;$('tabEdit').onclick=showEdit;$('next').onclick=()=>{if(mode==='match'||mode==='orient'||mode==='process')startTask(mode);else if(mode==='build')startBuild()};$('speak').onclick=()=>{if(current)speak(current.prompt||lab(current.answer))};$('resetScore').onclick=()=>{stats={match:[0,0],orient:[0,0],process:[0,0],build:[0,0]};update();feedback('',true)};document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('dragstart',e=>e.preventDefault());if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{})}update();showAAC();
</script></body></html>
